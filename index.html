// ═══ SCHEDULE ═══
function genSchedule(teams){
  var n=teams.length,pairs=[],counts=new Array(n).fill(0);
  var base=Math.floor(82/(n-1));
  for(var i=0;i<n;i++)for(var j=i+1;j<n;j++)for(var k=0;k<base;k++){
    pairs.push({home:k%2===0?i:j,away:k%2===0?j:i});counts[i]++;counts[j]++;
  }
  for(var pass=0;pass<50;pass++){
    var need=[];for(var i=0;i<n;i++)if(counts[i]<82)need.push({idx:i,gap:82-counts[i]});
    need.sort(function(a,b){return b.gap-a.gap});
    if(need.length<2)break;
    var paired={};
    for(var x=0;x<need.length;x++){if(paired[need[x].idx])continue;
      for(var y=x+1;y<need.length;y++){if(paired[need[y].idx])continue;
        pairs.push({home:need[x].idx,away:need[y].idx});counts[need[x].idx]++;counts[need[y].idx]++;
        paired[need[x].idx]=true;paired[need[y].idx]=true;break;
    }}
  }
  for(var i=pairs.length-1;i>0;i--){var j=R(0,i);var t=pairs[i];pairs[i]=pairs[j];pairs[j]=t}
  var sched=[],assigned=new Array(pairs.length).fill(false),day=1,total=0;
  while(total<pairs.length){
    var busy={};
    for(var i=0;i<pairs.length;i++){if(assigned[i])continue;var g=pairs[i];if(busy[g.home]||busy[g.away])continue;
      busy[g.home]=true;busy[g.away]=true;sched.push({home:g.home,away:g.away,day:day,result:null});assigned[i]=true;total++}
    day++;
  }
  return sched;
}

    var v={teams:vTeams,today:vToday,headlines:vHeadlines,standings:vStandings,schedule:vSchedule,leaders:vLeaders,awards:vAwards,allstar:vAllStar,draft:vDraft,history:vHistory};
    return(v[view]||vTeams)();
  }
  var played=state.schedule.filter(function(g){return g.result}).length;

  return h("div",{style:{maxWidth:960,margin:"0 auto",padding:"12px 16px"}},
    renderModal(),
    h("div",{style:{background:"linear-gradient(135deg,"+PRIMARY+",#8b1a2b)",color:"#fff",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,borderRadius:12,marginBottom:16,boxShadow:"0 4px 12px rgba(178,34,52,0.3)"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:12}},
        h("span",{style:{fontSize:28,fontWeight:800,letterSpacing:2}},"MDBA"),
        h("div",{style:{fontSize:11,opacity:0.85}},h("div",null,"Season "+(state.seasonNum||1)+" | "+state.phase.toUpperCase()+" | "+played+"/"+state.schedule.length),h("div",{style:{display:"flex",alignItems:"center",gap:4,marginTop:2}},h("span",{style:{display:"inline-block",width:7,height:7,borderRadius:"50%",background:conn?"#4caf50":"#ff5252"}}),h("span",{style:{fontSize:10}},conn?"LIVE":"OFFLINE")))
      ),
      h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
        state.phase==="season"&&!state.done?h("button",{style:{background:"#fff",color:PRIMARY,border:"none",borderRadius:6,padding:"6px 14px",fontWeight:600,fontSize:14,cursor:"pointer"},onClick:simDay},"\u25B6 Day"):null,
        state.phase==="season"&&!state.done?h("button",{style:{background:"#fff",color:PRIMARY,border:"none",borderRadius:6,padding:"6px 14px",fontWeight:600,fontSize:14,cursor:"pointer"},onClick:simWeek},"\u25B6\u25B6 Week"):null,
        state.phase==="season"&&!state.done?h("button",{style:{background:"#fff",color:PRIMARY,border:"none",borderRadius:6,padding:"6px 14px",fontWeight:600,fontSize:14,cursor:"pointer"},onClick:simAll},"\u23E9 All"):null,
        h("button",{style:{background:"#fff",color:PRIMARY,border:"none",borderRadius:6,padding:"6px 14px",fontWeight:600,fontSize:14,cursor:"pointer"},onClick:resetAll},"\u21BA")
      )
    ),
    h("div",{style:{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap",overflowX:"auto"}},tabs.map(function(t){return h("button",{key:t.k,className:"pill",style:{background:view===t.k&&!sub?PRIMARY:"#e8e8e8",color:view===t.k&&!sub?"#fff":"#444"},onClick:function(){setView(t.k);setSub(null)}},t.l)})),
    content()
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
