// ══════════════════════════════════════════
//  SCHEDULE
// ══════════════════════════════════════════
function genSchedule(teams){
  var n=teams.length,pairs=[],counts=new Array(n).fill(0);
  // 82 games per team, n-1=7 opponents. 11 games vs each = 77, need 5 more.
  // Play 12 games vs some opponents, 11 vs others
  var base=Math.floor(82/(n-1)); // 11
  var extra=82-base*(n-1); // 5 extra games to distribute
  for(var i=0;i<n;i++){
    var opponents=[];
    for(var j=0;j<n;j++){if(j!==i)opponents.push(j)}
    // Shuffle opponents to randomize who gets extra games
    for(var k=opponents.length-1;k>0;k--){var r=R(0,k);var tmp=opponents[k];opponents[k]=opponents[r];opponents[r]=tmp}
  }
  // Build matchup counts: each pair plays 'base' games, some play base+1
  var matchupCounts={};
  for(var i=0;i<n;i++)for(var j=i+1;j<n;j++)matchupCounts[i+"-"+j]=0;
  // First pass: base games for everyone
  for(var i=0;i<n;i++){
    for(var j=i+1;j<n;j++){
      for(var k=0;k<base;k++){
        var hi=k%2===0?i:j,ai=k%2===0?j:i;
        pairs.push({home:hi,away:ai});counts[hi]++;counts[ai]++;
        matchupCounts[i+"-"+j]++;
      }
    }
  }
  // Second pass: systematically add games until all teams have 82
  // Sort teams by how many games they still need (most needed first)
  for(var pass=0;pass<20;pass++){
    var need=[];
    for(var i=0;i<n;i++){if(counts[i]<82)need.push({idx:i,gap:82-counts[i]})}
    need.sort(function(a,b){return b.gap-a.gap});
    if(need.length<2)break;
    // Pair up teams that need games, starting with those needing the most
    var paired={};
    for(var x=0;x<need.length;x++){
      if(paired[need[x].idx])continue;
      for(var y=x+1;y<need.length;y++){
        if(paired[need[y].idx])continue;
        var a=need[x].idx,b=need[y].idx;
        pairs.push({home:a,away:b});counts[a]++;counts[b]++;
        paired[a]=true;paired[b]=true;
        break;
      }
    }
  }
  for(var i=pairs.length-1;i>0;i--){var j=R(0,i);var t=pairs[i];pairs[i]=pairs[j];pairs[j]=t}
  var sched=[],assigned=new Array(pairs.length).fill(false),day=1,total=0;
  while(total<pairs.length){
    var busy={};
    for(var i=0;i<pairs.length;i++){
      if(assigned[i])continue;var g=pairs[i];
      if(busy[g.home]||busy[g.away])continue;
      busy[g.home]=true;busy[g.away]=true;
      sched.push({home:g.home,away:g.away,day:day,result:null});assigned[i]=true;total++;
    }
    day++;
  }
  return sched;
}

var PB={PG:{reb:3.8,ast:7.5,blk:0.3,stl:1.6},SG:{reb:4.0,ast:4.0,blk:0.4,stl:1.3},SF:{reb:6.0,ast:3.5,blk:0.7,stl:1.2},PF:{reb:8.5,ast:2.8,blk:1.2,stl:0.8},C:{reb:11.0,ast:2.5,blk:2.2,stl:0.7}};

function getAvailablePlayers(team){
  return team.players.filter(function(p){return!p.injury||p.injury.games<=0});
}

function simGame(ht,at,headlines){
  var hPlayers=getAvailablePlayers(ht);
  var aPlayers=getAvailablePlayers(at);
  if(hPlayers.length<3)hPlayers=ht.players.slice(0,5);
  if(aPlayers.length<3)aPlayers=at.players.slice(0,5);

  var hOvr=hPlayers.reduce(function(s,p){return s+p.ovr},0)/hPlayers.length;
  var aOvr=aPlayers.reduce(function(s,p){return s+p.ovr},0)/aPlayers.length;
  var diff=(hOvr-aOvr)*0.18;
  var pace=RF(104,116),hadv=RF(0.5,3.5);
  var hTarget=Math.round(clamp(pace+diff+hadv+G(0,7),92,138));
  var aTarget=Math.round(clamp(pace-diff-hadv+G(0,7),92,138));

  function simTeam(players,target){
    var stats=[],totalPts=0;
    players.forEach(function(p,idx){
      var base=PB[p.pos]||PB.SF;
      var min=idx<5?RF(30,38):idx<8?RF(16,26):idx<11?RF(6,16):RF(0,6);
      var ms=min/36,form=RF(0.6,1.4);
      var power=Math.pow(p.ovr/78,2.8)*form;
      var star=p.ovr>=92?2.1:p.ovr>=87?1.6:p.ovr>=82?1.3:p.ovr>=77?1.1:1.0;

      var usage=(idx<5?RF(0.10,0.21):RF(0.04,0.12))*power;
      var fga=Math.round(clamp(usage*85*ms,0,idx<5?32:16));
      var fgp=clamp(0.34+(p.ovr-60)*0.005+G(0,0.06),0.28,0.62);
      var fgm=Math.round(fga*fgp);
      var tpa=Math.round(fga*RF(0.20,0.48));
      var tpp=clamp(0.27+(p.ovr-60)*0.004+G(0,0.07),0.20,0.48);
      var tpm=Math.round(tpa*tpp);
      var fta=Math.round(clamp(fga*RF(0.15,0.40),0,16));
      var ftp=clamp(0.60+(p.ovr-60)*0.008+G(0,0.08),0.50,0.95);
      var ftm=Math.round(fta*ftp);
      var pts=(fgm-tpm)*2+tpm*3+ftm;

      var rebM=(p.pos==="C"||p.pos==="PF")?star:1.0;
      var reb=Math.round(clamp(base.reb*ms*RF(0.5,1.5)*rebM,0,24));
      var oreb=Math.round(reb*RF(0.12,0.35));
      var ast=Math.round(clamp(base.ast*ms*power*RF(0.5,1.4)*(p.pos==="PG"?star:1.0),0,22));
      var stl=Math.round(clamp(base.stl*ms*RF(0.3,1.8)*star,0,8));
      var blk=Math.round(clamp(base.blk*ms*RF(0.3,2.2)*(p.pos==="C"?star*1.4:star),0,12));
      var to=Math.round(clamp(RF(0.3,3.5)*ms,0,8));
      var pf=Math.round(clamp(RF(0.8,4.5)*ms,0,6));

      totalPts+=pts;
      stats.push({name:p.name,pos:p.pos,ovr:p.ovr,ht:p.ht,wt:p.wt,min:Math.round(min),pts:pts,reb:reb,oreb:oreb,dreb:reb-oreb,ast:ast,stl:stl,blk:blk,to:to,pf:pf,fgm:fgm,fga:fga,tpm:tpm,tpa:tpa,ftm:ftm,fta:fta,ri:idx});
    });
    // normalize weighted by OVR
    if(totalPts>0&&totalPts!==target){
      var totO=stats.reduce(function(s,p){return s+p.ovr},0);
      var d=target-totalPts;
      stats.forEach(function(ps){ps.pts+=Math.round(d*(ps.ovr/totO))});
      var rem=target-stats.reduce(function(s,p){return s+p.pts},0);
      if(rem!==0)stats.reduce(function(b,p){return p.ovr>b.ovr?p:b},stats[0]).pts+=rem;
      stats.forEach(function(ps){if(ps.pts<0)ps.pts=0});
    }
    return stats;
  }

  var hs=simTeam(hPlayers,hTarget),as=simTeam(aPlayers,aTarget);
  var hT=hs.reduce(function(s,p){return s+p.pts},0);
  var aT=as.reduce(function(s,p){return s+p.pts},0);
  if(hT===aT){hs[R(0,Math.min(4,hs.length-1))].pts+=2;hT+=2}

  // INJURIES — 3% chance per game for any player
  var injuries=[];
  function checkInjury(players,teamName){
    players.forEach(function(p){
      if(Math.random()<0.03){
        var games=R(1,15);
        var types=["sprained ankle","knee soreness","hamstring strain","back tightness","shoulder injury","groin strain","calf strain","wrist sprain","concussion protocol","quad contusion"];
        var type=pick(types);
        p.injury={games:games,type:type};
        injuries.push({name:p.name,team:teamName,type:type,games:games});
        if(headlines)headlines.push({type:"injury",text:p.name+" ("+teamName+") OUT "+games+" games with "+type,icon:"\uD83C\uDFE5"});
      }
    });
  }
  checkInjury(hPlayers,ht.name);
  checkInjury(aPlayers,at.name);

  // Generate headlines for big performances
  if(headlines){
    var allStats=hs.concat(as);
    allStats.forEach(function(ps){
      var teamName=hs.indexOf(ps)>=0?ht.name:at.name;
      if(ps.pts>=40)headlines.push({type:"performance",text:ps.name+" ERUPTS for "+ps.pts+" points! ("+teamName+")",icon:"\uD83D\uDD25"});
      else if(ps.pts>=30)headlines.push({type:"performance",text:ps.name+" drops "+ps.pts+" in "+(hT>aT&&hs.indexOf(ps)>=0||aT>hT&&as.indexOf(ps)>=0?"a win":"a loss")+" ("+teamName+")",icon:"\u2B50"});
      if(ps.reb>=15)headlines.push({type:"performance",text:ps.name+" dominates the glass with "+ps.reb+" rebounds ("+teamName+")",icon:"\uD83D\uDCAA"});
      if(ps.ast>=12)headlines.push({type:"performance",text:ps.name+" dishes "+ps.ast+" assists ("+teamName+")",icon:"\uD83C\uDFAF"});
      if(ps.blk>=5)headlines.push({type:"performance",text:ps.name+" records "+ps.blk+" BLOCKS ("+teamName+")",icon:"\uD83D\uDEAB"});
      if(ps.stl>=5)headlines.push({type:"performance",text:ps.name+" with "+ps.stl+" steals ("+teamName+")",icon:"\uD83D\uDC40"});
      // triple double
      if(ps.pts>=10&&ps.reb>=10&&ps.ast>=10)headlines.push({type:"milestone",text:"\uD83D\uDCA5 TRIPLE-DOUBLE: "+ps.name+" with "+ps.pts+"/"+ps.reb+"/"+ps.ast+" ("+teamName+")",icon:"\uD83D\uDCA5"});
    });
    // blowout
    if(Math.abs(hT-aT)>=25){
      var winner=hT>aT?ht.name:at.name;
      headlines.push({type:"game",text:winner+" wins by "+Math.abs(hT-aT)+" in a BLOWOUT",icon:"\uD83D\uDCA8"});
    }
    // buzzer beater (close game)
    if(Math.abs(hT-aT)<=3){
      headlines.push({type:"game",text:"THRILLER! "+(hT>aT?ht.name:at.name)+" edges "+(hT>aT?at.name:ht.name)+" "+Math.max(hT,aT)+"-"+Math.min(hT,aT),icon:"\uD83D\uDE31"});
    }
  }

  return{homeScore:hT,awayScore:aT,homeStats:hs,awayStats:as,injuries:injuries};
}

function accumStats(team,gs){
  gs.forEach(function(g){
    var p=team.players.find(function(x){return x.name===g.name});
    if(!p)return;var s=p.stats;
    s.gp++;s.pts+=g.pts;s.reb+=g.reb;s.oreb+=g.oreb;s.dreb+=g.dreb;
    s.ast+=g.ast;s.stl+=g.stl;s.blk+=g.blk;s.to+=g.to;s.pf+=g.pf;
    s.fgm+=g.fgm;s.fga+=g.fga;s.tpm+=g.tpm;s.tpa+=g.tpa;s.ftm+=g.ftm;s.fta+=g.fta;s.min+=g.min;
  });
}

function tickInjuries(teams){
  teams.forEach(function(t){t.players.forEach(function(p){
    if(p.injury&&p.injury.games>0)p.injury.games--;
    if(p.injury&&p.injury.games<=0)p.injury=null;
  })});
}

function ageAndRetire(teams){
  var retired=[];
  teams.forEach(function(team){
    var rem=[];
    team.players.forEach(function(p,i){
      p.prevOvr=p.ovr;p.age++;
      if(p.age<=25)p.ovr=Math.min(99,p.ovr+R(0,3));
      else if(p.age<=30)p.ovr=clamp(p.ovr+R(-2,1),50,99);
      else if(p.age<=33)p.ovr=Math.max(50,p.ovr+R(-3,0));
      else p.ovr=Math.max(45,p.ovr+R(-5,-1));
      if(!p.ovrHistory)p.ovrHistory=[];p.ovrHistory.push(p.ovr);
      var chance=0;
      if(p.age>=38)chance=1;else if(p.age>=37)chance=0.9;else if(p.age>=36)chance=0.75;else if(p.age>=35)chance=0.55;else if(p.age>=34)chance=0.35;
      if(Math.random()<chance){rem.push(i);retired.push({name:p.name,pos:p.pos,age:p.age,ovr:p.ovr,ht:p.ht,wt:p.wt,team:team.name,teamColor:team.color,strengths:p.strengths})}
    });
    rem.sort(function(a,b){return b-a}).forEach(function(i){team.players.splice(i,1)});
  });
  return retired;
}

function runDraft(teams,numRetired){
  var numPicks=teams.length,numP=Math.max(numPicks,numRetired)+6;
  var used=new Set();teams.forEach(function(t){t.players.forEach(function(p){used.add(p.name)})});
  var prospects=[];
  for(var i=0;i<numP;i++){
    var pos=pick(POSITIONS),age=R(19,22);
    var pctile=1-(i/numP);
    var ovr=clamp(Math.round(62+pctile*26+G(0,4)),58,92);
    var name=genName(used);used.add(name);
    prospects.push({name:name,pos:pos,age:age,ovr:ovr,ht:genHeight(pos),wt:genWeight(pos),strengths:genStrengths(pos,ovr),weakness:genWeakness(),info:genScout(pos,ovr),draftRank:i+1});
  }
  prospects.sort(function(a,b){return b.ovr-a.ovr});
  prospects.forEach(function(p,i){p.draftRank=i+1});
  // lottery
  var sorted=teams.slice().sort(function(a,b){return(a.wins/Math.max(a.wins+a.losses,1))-(b.wins/Math.max(b.wins+b.losses,1))});
  var weights=sorted.map(function(_,i){return sorted.length-i+R(0,3)});
  var order=[],usedIdx=new Set();
  while(order.length<sorted.length){
    var tot=0;for(var i=0;i<weights.length;i++)if(!usedIdx.has(i))tot+=weights[i];
    var r=Math.random()*tot;
    for(var i=0;i<sorted.length;i++){if(usedIdx.has(i))continue;r-=weights[i];if(r<=0){order.push(sorted[i]);usedIdx.add(i);break}}
    if(order.length<sorted.length&&usedIdx.size===order.length){for(var i=0;i<sorted.length;i++)if(!usedIdx.has(i)){order.push(sorted[i]);usedIdx.add(i)}}
  }
  var picks=[],avail=prospects.slice();
  order.forEach(function(team,pi){
    if(!avail.length)return;var ch=avail.shift();
    team.players.push(makePlayer(ch.name,ch.pos,ch.age,ch.ovr,ch.ht,ch.wt,ch.strengths,ch.weakness,ch.info));
    team.players.sort(function(a,b){return b.ovr-a.ovr});
    picks.push({pick:pi+1,team:team.name,teamColor:team.color,player:ch});
  });
  return{picks:picks,prospects:prospects,undrafted:avail};
}

function initPlayoffs(teams){
  var sorted=teams.slice().sort(function(a,b){return(b.wins/Math.max(b.wins+b.losses,1))-(a.wins/Math.max(a.wins+a.losses,1))||b.wins-a.wins});
  var top4=sorted.slice(0,4);
  return{round:"semis",matchups:[{higher:0,lower:3,hWins:0,lWins:0,games:[],hName:top4[0].name,lName:top4[3].name,hColor:top4[0].color,lColor:top4[3].color},{higher:1,lower:2,hWins:0,lWins:0,games:[],hName:top4[1].name,lName:top4[2].name,hColor:top4[1].color,lColor:top4[2].color}],seeds:top4.map(function(t){return{name:t.name,color:t.color}}),finals:null,champion:null};
}

function simPlayoffGame(st,matchupIdx){
  var po=st.playoffs,mu=po.round==="finals"?po.finals:po.matchups[matchupIdx];
  var hTeam=st.teams.find(function(t){return t.name===mu.hName});
  var lTeam=st.teams.find(function(t){return t.name===mu.lName});
  if(!hTeam||!lTeam)return;
  var homeTeam=mu.games.length%2===0?hTeam:lTeam;
  var awayTeam=homeTeam===hTeam?lTeam:hTeam;
  var headlines=st.headlines||[];
  var result=simGame(homeTeam,awayTeam,headlines);
  mu.games.push(result);
  var hWon=(homeTeam===hTeam&&result.homeScore>result.awayScore)||(awayTeam===hTeam&&result.awayScore>result.homeScore);
  if(hWon)mu.hWins++;else mu.lWins++;
  accumStats(homeTeam,result.homeStats);accumStats(awayTeam,result.awayStats);
  tickInjuries(st.teams);
  // Check series over
  if(mu.hWins>=4||mu.lWins>=4){
    var winner=mu.hWins>=4?mu.hName:mu.lName;
    var winColor=mu.hWins>=4?mu.hColor:mu.lColor;
    headlines.push({type:"playoff",text:winner+" wins the "+(po.round==="finals"?"CHAMPIONSHIP":"series")+"!",icon:po.round==="finals"?"\uD83C\uDFC6":"\uD83C\uDFC0"});
    if(po.round==="semis"){
      var otherMu=po.matchups[matchupIdx===0?1:0];
      var otherDone=otherMu.hWins>=4||otherMu.lWins>=4;
      if(otherDone){
        var w1=po.matchups[0].hWins>=4?po.matchups[0].hName:po.matchups[0].lName;
        var c1=po.matchups[0].hWins>=4?po.matchups[0].hColor:po.matchups[0].lColor;
        var w2=po.matchups[1].hWins>=4?po.matchups[1].hName:po.matchups[1].lName;
        var c2=po.matchups[1].hWins>=4?po.matchups[1].hColor:po.matchups[1].lColor;
        po.finals={higher:0,lower:1,hWins:0,lWins:0,games:[],hName:w1,lName:w2,hColor:c1,lColor:c2};
        po.round="finals";
        headlines.push({type:"playoff",text:"FINALS SET: "+w1+" vs "+w2,icon:"\uD83D\uDD25"});
      }
    } else if(po.round==="finals"){
      po.champion={name:winner,color:winColor};
    }
  }
  st.headlines=headlines;
}

function getAwards(st){
  var all=[];
  st.teams.forEach(function(t){
    var wp=t.wins/Math.max(t.wins+t.losses,1);
    t.players.forEach(function(p,i){if(p.stats.gp>=1)all.push({name:p.name,pos:p.pos,ovr:p.ovr,age:p.age,ht:p.ht,wt:p.wt,stats:p.stats,strengths:p.strengths,teamName:t.name,teamColor:t.color,ri:i,wp:wp,prevOvr:p.prevOvr||p.ovr})});
  });
  function sc(list,fn){return list.map(function(p){return Object.assign({},p,{score:fn(p)})}).sort(function(a,b){return b.score-a.score}).slice(0,5)}
  var gp5=all.filter(function(p){return p.stats.gp>=5});
  return{
    mvp:sc(gp5,function(p){var g=p.stats.gp;return p.stats.pts/g+(p.stats.reb/g)*.7+(p.stats.ast/g)*.85+(p.stats.stl/g)*1.2+p.stats.blk/g+p.wp*18}),
    dpoy:sc(gp5,function(p){var g=p.stats.gp;return(p.stats.stl/g)*2+(p.stats.blk/g)*2.5+(p.stats.reb/g)*.4}),
    smoy:sc(all.filter(function(p){return p.ri>=5&&p.stats.gp>=5}),function(p){var g=p.stats.gp;return p.stats.pts/g+(p.stats.reb/g)*.5+(p.stats.ast/g)*.7}),
    mip:sc(all.filter(function(p){return p.ovr<=80&&p.stats.gp>=5}),function(p){var g=p.stats.gp;return p.stats.pts/g-p.ovr*.2+(p.stats.reb/g)*.3+(p.stats.ast/g)*.3}),
    roy:sc(all.filter(function(p){return p.age<=22&&p.stats.gp>=5}),function(p){var g=p.stats.gp;return p.stats.pts/g+(p.stats.reb/g)*.5+(p.stats.ast/g)*.5})
  };
}
function getLeaders(st){
  var all=[];st.teams.forEach(function(t){t.players.forEach(function(p){if(p.stats.gp>=1)all.push(Object.assign({},p,{teamName:t.name,teamColor:t.color}))})});
  function top(k){return all.slice().sort(function(a,b){return(b.stats[k]/b.stats.gp)-(a.stats[k]/a.stats.gp)}).slice(0,20)}
  return{pts:top("pts"),reb:top("reb"),ast:top("ast"),stl:top("stl"),blk:top("blk")};
}
function getPowerRankings(st){
  // Based on win%, recent form (last 10), and avg OVR
  return st.teams.slice().sort(function(a,b){
    var aWp=a.wins/Math.max(a.wins+a.losses,1);
    var bWp=b.wins/Math.max(b.wins+b.losses,1);
    var aOvr=a.players.reduce(function(s,p){return s+p.ovr},0)/a.players.length;
    var bOvr=b.players.reduce(function(s,p){return s+p.ovr},0)/b.players.length;
    var aScore=aWp*60+aOvr*0.4;var bScore=bWp*60+bOvr*0.4;
    return bScore-aScore;
  });
}

  function buildInit(){

  }

  function sync(s){var wid="w"+Date.now()+Math.random();lastWId.current=wid;s._wid=wid;s.version=VERSION;setState(s);gameRef.set(s)}

  // ── ACTIONS ──
  function processGame(n,gi){
    var g=n.schedule[gi];if(g.result)return;
    var ht=n.teams[g.home],at=n.teams[g.away];
    if(!n.headlines)n.headlines=[];
    g.result=simGame(ht,at,n.headlines);
    if(g.result.homeScore>g.result.awayScore){ht.wins++;at.losses++}else{at.wins++;ht.losses++}
    accumStats(ht,g.result.homeStats);accumStats(at,g.result.awayStats);
    tickInjuries(n.teams);
  }

  function simIdx(gi){var n=DC(state);processGame(n,gi);checkSeasonEnd(n);sync(n)}

  function simDay(){
    var n=DC(state);
    n.schedule.filter(function(g){return g.day===n.currentDay&&!g.result}).forEach(function(g){processGame(n,n.schedule.indexOf(g))});
    var allDayDone=!n.schedule.some(function(g){return g.day===n.currentDay&&!g.result});
    if(allDayDone){var mx=Math.max.apply(null,n.schedule.map(function(g){return g.day}));if(n.currentDay<mx)n.currentDay++}
    checkSeasonEnd(n);sync(n);
  }

  function advDay(){var n=DC(state);var mx=Math.max.apply(null,n.schedule.map(function(g){return g.day}));if(n.currentDay<mx)n.currentDay++;sync(n)}

  function simWeek(){

      if(allDayDone){var mx=Math.max.apply(null,n.schedule.map(function(g){return g.day}));if(n.currentDay<mx)n.currentDay++;else break}

  function checkSeasonEnd(n){
    if(n.schedule.every(function(g){return g.result})){
      n.done=true;n.phase="playoffs";n.playoffs=initPlayoffs(n.teams);
      if(!n.headlines)n.headlines=[];

  function simPlayoffGameAction(muIdx){
    var n=DC(state);simPlayoffGame(n,muIdx);

  function archiveSeason(st){
    var sorted=st.teams.slice().sort(function(a,b){return(b.wins/Math.max(b.wins+b.losses,1))-(a.wins/Math.max(a.wins+a.losses,1))||b.wins-a.wins});
    var aw=getAwards(st),ld=getLeaders(st);
    var ch=st.playoffs&&st.playoffs.champion?st.playoffs.champion:{name:sorted[0].name,color:sorted[0].color};
    var mv=(aw.mvp||[])[0];
    if(!st.history)st.history=[];
    st.history.push({id:Date.now(),date:new Date().toLocaleDateString(),sn:st.seasonNum||1,champ:ch.name,champColor:ch.color,champRec:sorted[0].wins+"-"+sorted[0].losses,mvp:mv?mv.name:"N/A",mvpTeam:mv?mv.teamName:"",awards:aw,leaders:ld,standings:sorted.map(function(t){return{name:t.name,color:t.color,w:t.wins,l:t.losses}})});
  }

  function nextSeason(){
    var n=DC(state);
    var retired=ageAndRetire(n.teams);
    var draft=runDraft(n.teams,retired.length);
    // Free agents = undrafted
    var fa=draft.undrafted.map(function(p){return makePlayer(p.name,p.pos,p.age,p.ovr,p.ht,p.wt,p.strengths,p.weakness,p.info)});
    n.teams.forEach(function(t){t.wins=0;t.losses=0;t.players.forEach(function(p){p.stats=emptyStats();p.injury=null})});
    n.schedule=genSchedule(n.teams);n.currentDay=1;n.done=false;n.seasonNum=(n.seasonNum||1)+1;
    n.lastDraft=draft;n.lastRetired=retired;n.freeAgents=fa;n.playoffs=null;n.phase="season";n.headlines=[];
    if(!n.allRetired)n.allRetired=[];n.allRetired=n.allRetired.concat(retired);
    sync(n);setView("draft");setSub(null);
  }

  function signFA(teamIdx,faIdx){
    var n=DC(state);var fa=n.freeAgents[faIdx];if(!fa)return;
    n.teams[teamIdx].players.push(makePlayer(fa.name,fa.pos,fa.age,fa.ovr,fa.ht,fa.wt,fa.strengths,fa.weakness,fa.info));
    n.teams[teamIdx].players.sort(function(a,b){return b.ovr-a.ovr});
    n.freeAgents.splice(faIdx,1);
    if(!n.headlines)n.headlines=[];
    n.headlines.push({type:"trade",text:fa.name+" signs with "+n.teams[teamIdx].name+"!",icon:"\uD83D\uDCDD"});
    sync(n);
  }

  function executeTrade(){
    if(!tradePlayersA.length&&!tradePlayersB.length)return;
    var n=DC(state);
    var tA=n.teams[tradeTeamA],tB=n.teams[tradeTeamB];
    var pA=tradePlayersA.map(function(i){return tA.players[i]});
    var pB=tradePlayersB.map(function(i){return tB.players[i]});
    // remove from teams (reverse order)
    tradePlayersA.slice().sort(function(a,b){return b-a}).forEach(function(i){tA.players.splice(i,1)});
    tradePlayersB.slice().sort(function(a,b){return b-a}).forEach(function(i){tB.players.splice(i,1)});
    // add to other teams
    pA.forEach(function(p){tB.players.push(p)});
    pB.forEach(function(p){tA.players.push(p)});
    tA.players.sort(function(a,b){return b.ovr-a.ovr});
    tB.players.sort(function(a,b){return b.ovr-a.ovr});
    if(!n.headlines)n.headlines=[];
    var aNames=pA.map(function(p){return p.name}).join(", ");
    var bNames=pB.map(function(p){return p.name}).join(", ");
    n.headlines.push({type:"trade",text:"TRADE: "+tA.name+" sends "+aNames+" to "+tB.name+" for "+bNames,icon:"\uD83D\uDD04"});
    setTradePlayersA([]);setTradePlayersB([]);
    sync(n);
  }

            h("td",{style:{padding:"6px"}},ovrBadge(p.ovr)),h("td",{style:{padding:"6px",fontSize:11}},htStr(p.ht||75)),
            h("td",{style:{padding:"6px",fontSize:11}},p.wt||210),h("td",{style:{padding:"6px"}},p.age),
            h("td",{style:{padding:"6px"}},strengthPills(p.strengths)),
            h("td",{style:{padding:"6px"}},dot(p.teamColor),p.team)
          );
        }))
      ))
    );
  }

  // HISTORY
  function vHistory(){
    var hist=state.history||[];
    return h("div",{className:"card"},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
        h("h2",{style:{color:PRIMARY,fontSize:18}},"Season History"),
        hist.length>0?(cda?h("div",{style:{display:"flex",gap:4}},
          btnSm("Confirm",function(){var n=DC(state);n.history=[];sync(n);setCda(false)},{background:"#dc3545"}),btnSm("Cancel",function(){setCda(false)})
        ):btnSm("Delete All",function(){setCda(true)},{background:"#dc3545"})):null
      ),
      hist.length===0?h("p",{style:{color:"#999"}},"No completed seasons yet."):
      hist.map(function(s,si){return h("div",{key:s.id,style:{marginBottom:12,background:"#f8f9fa",borderRadius:10,padding:14,border:"1px solid #eee"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",flexWrap:"wrap",gap:8},onClick:function(){setExp(exp===si?null:si)}},
          h("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},
            h("span",{style:{fontWeight:800,fontSize:15,color:PRIMARY}},"Season "+(s.sn||si+1)),
            h("span",{style:{fontSize:24}},"\uD83C\uDFC6"),dot(s.champColor),h("span",{style:{fontWeight:600}},s.champ),
            h("span",{style:{fontSize:12,color:"#888"}},"MVP: "+s.mvp),h("span",{style:{fontSize:11,color:"#bbb"}},s.date)
          ),
          cd===s.id?h("div",{style:{display:"flex",gap:4}},
            btnSm("Confirm",function(e){e.stopPropagation();var n=DC(state);n.history=n.history.filter(function(x){return x.id!==s.id});sync(n);setCd(null)},{background:"#dc3545"}),
            btnSm("Cancel",function(e){e.stopPropagation();setCd(null)})
          ):btnSm("Delete",function(e){e.stopPropagation();setCd(s.id)},{background:"#dc3545"})
        ),
        exp===si?h("div",{style:{marginTop:12}},
          h("h4",{style:{marginBottom:8,fontSize:12,color:"#888",textTransform:"uppercase"}},"Final Standings"),
          (s.standings||[]).map(function(t,i){return h("div",{key:t.name,style:{fontSize:13,padding:"3px 0"}},""+(i+1)+". ",dot(t.color),t.name+" ("+t.w+"-"+t.l+")")}),
          s.awards?h("div",{style:{marginTop:12}},
            ["mvp","dpoy","smoy","mip","roy"].map(function(k){var label={mvp:"MVP",dpoy:"DPOY",smoy:"6MOY",mip:"MIP",roy:"ROY"}[k];var w=(s.awards[k]||[])[0];return w?h("div",{key:k,style:{fontSize:13}},h("span",{style:{fontWeight:600}},label+": "),w.name):null})
          ):null
        ):null
      )})
    );
  }

  // ══════════════════════
  //  MAIN LAYOUT
  // ══════════════════════
  var tabs=[
    {k:"today",l:state.phase==="playoffs"?"Playoffs":state.phase==="offseason"?"Offseason":"Today"},
    {k:"headlines",l:"\uD83D\uDCF0 News"},{k:"standings",l:"Standings"},{k:"schedule",l:"Schedule"},
    {k:"leaders",l:"Leaders"},{k:"players",l:"Players"},{k:"awards",l:"Awards"},
    {k:"power",l:"Power"},{k:"trades",l:"Trades"},{k:"freeagency",l:"Free Agency"},
    {k:"draft",l:"Draft"},{k:"retired",l:"Retired"},{k:"history",l:"History"}
  ];

  function content(){
    if(sub){if(sub.t==="team")return vTeam(sub.d);if(sub.t==="box")return vBox(sub.d)}
    var views={today:vToday,headlines:vHeadlines,standings:vStandings,schedule:vSchedule,leaders:vLeaders,players:vPlayers,awards:vAwards,power:vPower,trades:vTrades,freeagency:vFreeAgency,draft:vDraft,retired:vRetired,history:vHistory};
    return(views[view]||vToday)();
  }

  var played=state.schedule.filter(function(g){return g.result}).length;

  return h("div",{style:{maxWidth:960,margin:"0 auto",padding:"12px 16px"}},
    renderModal(),
    // HEADER
    h("div",{style:{background:"linear-gradient(135deg,"+PRIMARY+",#8b1a2b)",color:"#fff",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,borderRadius:12,marginBottom:16,boxShadow:"0 4px 12px rgba(178,34,52,0.3)"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:12}},
        h("span",{style:{fontSize:28,fontWeight:800,letterSpacing:2}},"MDBA"),
        h("div",{style:{fontSize:11,opacity:0.85,lineHeight:1.4}},
          h("div",null,"Season "+(state.seasonNum||1)+" | "+state.phase.toUpperCase()+" | "+played+"/"+state.schedule.length),
          h("div",{style:{display:"flex",alignItems:"center",gap:4,marginTop:2}},h("span",{style:{display:"inline-block",width:7,height:7,borderRadius:"50%",background:conn?"#4caf50":"#ff5252"}}),h("span",{style:{fontSize:10}},conn?"LIVE":"OFFLINE"))
        )
      ),
      h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
        state.phase==="season"&&!state.done?btn("\u25B6 Day",simDay):null,
        state.phase==="season"&&!state.done?btn("\u25B6\u25B6 Week",simWeek):null,
        state.phase==="season"&&!state.done?btn("\u23E9 All",simAll):null,
        btn("\u2B07",download),btn("\u21BA",resetAll)
      )
    ),
    // TABS
    h("div",{style:{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap",overflowX:"auto"}},
      tabs.map(function(t){return h("button",{key:t.k,className:"pill",style:{background:view===t.k&&!sub?PRIMARY:"#e8e8e8",color:view===t.k&&!sub?"#fff":"#444"},onClick:function(){setView(t.k);setSub(null)}},t.l)})
    ),
    content()
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
