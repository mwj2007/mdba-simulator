function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randF(min, max) { return Math.random() * (max - min) + min; }
function gaussRand(mean, std) {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return mean + std * Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}
function pick(arr) { return arr[rand(0, arr.length - 1)]; }

function generatePlayerName() {
  return pick(FIRST_NAMES).toUpperCase() + ' ' + pick(LAST_NAMES).toUpperCase();
}

function generateScoutReport(pos, ovr) {
  const skill1 = pick(SKILLS[pos] || SKILLS.SF);
  let skill2 = pick(SKILLS[pos] || SKILLS.SF);
  while (skill2 === skill1) skill2 = pick(SKILLS[pos] || SKILLS.SF);
  let tier = '';
  if (ovr >= 85) tier = 'Franchise-caliber talent. ';
  else if (ovr >= 78) tier = 'Potential starter. ';
  else if (ovr >= 70) tier = 'Solid role player. ';
  else tier = 'Developmental prospect. ';
  return tier + skill1 + ', ' + skill2.toLowerCase();
}

function generateProspect(rank, totalPicks) {
  const pos = pick(['PG','SG','SF','PF','C']);
  const age = rand(19, 22);
  // Top picks get higher OVR
  const pctile = 1 - (rank / totalPicks);
  const baseOvr = Math.round(62 + pctile * 26 + gaussRand(0, 4));
  const ovr = Math.max(58, Math.min(92, baseOvr));
  const name = generatePlayerName();
  const info = generateScoutReport(pos, ovr);
  return { name, pos, age, ovr, info, draftRank: rank + 1 };
}

// ─── Aging / Retirement ───
function ageAndRetire(teams) {
  const retired = [];
  teams.forEach(team => {
    const toRetire = [];
    team.players.forEach((p, idx) => {
      p.age += 1;
      // OVR changes based on age
      if (p.age <= 25) {
        p.ovr = Math.min(99, p.ovr + rand(0, 3));
      } else if (p.age <= 30) {
        p.ovr = Math.max(50, Math.min(99, p.ovr + rand(-2, 1)));
      } else if (p.age <= 33) {
        p.ovr = Math.max(50, p.ovr + rand(-3, 0));
      } else {
        p.ovr = Math.max(45, p.ovr + rand(-5, -1));
      }
      // Retirement check
      let retireChance = 0;
      if (p.age >= 38) retireChance = 1.0;
      else if (p.age >= 37) retireChance = 0.90;
      else if (p.age >= 36) retireChance = 0.75;
      else if (p.age >= 35) retireChance = 0.55;
      else if (p.age >= 34) retireChance = 0.35;
      if (Math.random() < retireChance) {
        toRetire.push(idx);
        retired.push({ ...p, team: team.name, teamColor: team.color });
      }
    });
    // Remove retired (reverse order to preserve indices)
    toRetire.sort((a, b) => b - a).forEach(idx => team.players.splice(idx, 1));
  });
  return retired;
}

// ─── Draft Lottery ───
function draftLottery(teams) {
  const sorted = [...teams].sort((a, b) => {
    const wpctA = a.wins / Math.max(a.wins + a.losses, 1);
    const wpctB = b.wins / Math.max(b.wins + b.losses, 1);
    return wpctA - wpctB; // worst team first
  });
  // Weighted lottery: worst team gets most balls
  const weights = sorted.map((_, i) => sorted.length - i + rand(0, 3));
  const totalWeight = weights.reduce((s, w) => s + w, 0);
  const order = [];
  const used = new Set();
  while (order.length < sorted.length) {
    let r = Math.random() * totalWeight;
    for (let i = 0; i < sorted.length; i++) {
      if (used.has(i)) continue;
      r -= weights[i];
      if (r <= 0) {
        order.push(sorted[i]);
        used.add(i);
        break;
      }
    }
    // safety
    if (order.length < sorted.length) {
      for (let i = 0; i < sorted.length; i++) {
        if (!used.has(i) && order.length < sorted.length) {
          let found = false;
          for (let j = 0; j < order.length; j++) { if (order[j].name === sorted[i].name) found = true; }
          if (!found) { /* will be caught next iteration */ }
        }
      }
    }
  }
  return order;
}

function runDraft(teams, numRetirees) {
  const numPicks = teams.length; // 1 round = 1 pick per team
  const numProspects = Math.max(numPicks, numRetirees) + 4;
  const prospects = [];
  const usedNames = new Set();
  teams.forEach(t => t.players.forEach(p => usedNames.add(p.name)));
  for (let i = 0; i < numProspects; i++) {
    let prospect = generateProspect(i, numProspects);
    let tries = 0;
    while (usedNames.has(prospect.name) && tries < 20) {
      prospect = generateProspect(i, numProspects);
      tries++;
    }
    usedNames.add(prospect.name);
    prospects.push(prospect);
  }
  prospects.sort((a, b) => b.ovr - a.ovr);
  // assign draft rankings
  prospects.forEach((p, i) => { p.draftRank = i + 1; });

  const draftOrder = draftLottery(teams);
  const picks = [];
  const available = [...prospects];

  draftOrder.forEach((team, pickNum) => {
    if (available.length === 0) return;
    // pick best available
    const chosen = available.shift();
    const newPlayer = {
      name: chosen.name,
      pos: chosen.pos,
      age: chosen.age,
      ovr: chosen.ovr,
      info: chosen.info,
      stats: { gp:0, pts:0, reb:0, oreb:0, dreb:0, ast:0, stl:0, blk:0, to:0, pf:0, fgm:0, fga:0, tpm:0, tpa:0, ftm:0, fta:0, min:0 }
    };
    team.players.push(newPlayer);
    team.players.sort((a, b) => b.ovr - a.ovr);
    picks.push({ pick: pickNum + 1, team: team.name, teamColor: team.color, player: chosen });
  });

  return { picks, prospects, undrafted: available };
}

// ─── Schedule Generator ───
function generateSchedule(teams) {
  const n = teams.length;
  const gamesPerTeam = 82;
  const gamePairs = [];
  const gamesPerPair = Math.floor(gamesPerTeam / (n - 1));
  const teamGameCounts = new Array(n).fill(0);

  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      for (let k = 0; k < gamesPerPair; k++) {
        const homeIdx = k % 2 === 0 ? i : j;
        const awayIdx = k % 2 === 0 ? j : i;
        gamePairs.push({ home: homeIdx, away: awayIdx });
        teamGameCounts[homeIdx]++;
        teamGameCounts[awayIdx]++;
      }
    }
  }
  let safety = 0;
  while (safety < 10000) {
    let allDone = true;
    for (let i = 0; i < n; i++) { if (teamGameCounts[i] < gamesPerTeam) { allDone = false; break; } }
    if (allDone) break;
    const i = rand(0, n - 1);
    const j = rand(0, n - 1);
    if (i === j || teamGameCounts[i] >= gamesPerTeam || teamGameCounts[j] >= gamesPerTeam) { safety++; continue; }
    gamePairs.push({ home: i, away: j });
    teamGameCounts[i]++; teamGameCounts[j]++;
    safety++;
  }
  for (let i = gamePairs.length - 1; i > 0; i--) {
    const j = rand(0, i);
    [gamePairs[i], gamePairs[j]] = [gamePairs[j], gamePairs[i]];
  }
  const schedule = [];
  const assigned = new Array(gamePairs.length).fill(false);
  let day = 1, totalAssigned = 0;
  while (totalAssigned < gamePairs.length) {
    const busyTeams = new Set();
    for (let i = 0; i < gamePairs.length; i++) {
      if (assigned[i]) continue;
      const g = gamePairs[i];
      if (busyTeams.has(g.home) || busyTeams.has(g.away)) continue;
      busyTeams.add(g.home); busyTeams.add(g.away);
      schedule.push({ ...g, day, result: null });
      assigned[i] = true; totalAssigned++;
    }
    day++;
  }
  return schedule;
}

// ─── Simulation Engine ───
const POS_BASELINES = {
  PG: { reb: 3.5, ast: 6.5, blk: 0.2, stl: 1.3 },
  SG: { reb: 3.8, ast: 3.5, blk: 0.3, stl: 1.1 },
  SF: { reb: 5.5, ast: 3.0, blk: 0.5, stl: 1.0 },
  PF: { reb: 7.5, ast: 2.5, blk: 0.8, stl: 0.7 },
  C:  { reb: 9.5, ast: 2.0, blk: 1.5, stl: 0.6 }
};

function getMinutes(rosterIdx) {
  if (rosterIdx < 5) return randF(30, 38);
  if (rosterIdx < 8) return randF(16, 26);
  if (rosterIdx < 11) return randF(6, 16);
  return randF(0, 6);
}

function simGame(homeTeam, awayTeam) {
  const homeAvg = homeTeam.players.reduce((s, p) => s + p.ovr, 0) / homeTeam.players.length;
  const awayAvg = awayTeam.players.reduce((s, p) => s + p.ovr, 0) / awayTeam.players.length;
  const diff = (homeAvg - awayAvg) * 0.18;
  const pace = randF(104, 116);
  const homeAdv = randF(0.5, 3.5);
  const homeTarget = Math.round(pace + diff + homeAdv + gaussRand(0, 7));
  const awayTarget = Math.round(pace - diff - homeAdv + gaussRand(0, 7));
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const homeScore = clamp(homeTarget, 92, 135);
  const awayScore = clamp(awayTarget, 92, 135);

  function simTeamStats(team, targetScore) {
    const playerStats = [];
    let totalPts = 0;
    team.players.forEach((player, idx) => {
      const base = POS_BASELINES[player.pos] || POS_BASELINES.SF;
      const minutes = getMinutes(idx);
      const minScale = minutes / 36;
      const gameForm = randF(0.65, 1.35);

      // ── Star boost: higher OVR = way more shots ──
      // OVR 96 gets ~2.2x usage, OVR 72 gets ~0.7x
      const ovrPower = Math.pow(player.ovr / 78, 2.5);
      const ratingScale = ovrPower * gameForm;

      // Usage scales heavily with OVR
      const baseUsage = idx < 5 ? randF(0.10, 0.20) : randF(0.04, 0.12);
      const usageRate = baseUsage * ratingScale;
      const fga = Math.round(clamp(usageRate * 85 * minScale, 0, idx < 5 ? 30 : 16));
      const fgPct = clamp(0.33 + (player.ovr - 60) * 0.005 + gaussRand(0, 0.06), 0.28, 0.62);
      const fgm = Math.round(fga * fgPct);
      const tpa = Math.round(fga * randF(0.20, 0.50));
      const tpPct = clamp(0.26 + (player.ovr - 60) * 0.004 + gaussRand(0, 0.07), 0.20, 0.48);
      const tpm = Math.round(tpa * tpPct);
      const fta = Math.round(clamp(fga * randF(0.15, 0.40), 0, 16));
      const ftPct = clamp(0.58 + (player.ovr - 60) * 0.008 + gaussRand(0, 0.08), 0.50, 0.95);
      const ftm = Math.round(fta * ftPct);
      const pts = (fgm - tpm) * 2 + tpm * 3 + ftm;

      // ── Star stat boosts ──
      // Elite players at their position get amplified signature stats
      const starMult = player.ovr >= 90 ? 1.8 : player.ovr >= 85 ? 1.4 : player.ovr >= 80 ? 1.1 : 1.0;
      const reb = Math.round(clamp(base.reb * minScale * randF(0.5, 1.5) * (player.pos === 'C' || player.pos === 'PF' ? starMult : 1.0), 0, 22));
      const oreb = Math.round(reb * randF(0.12, 0.38));
      const dreb = reb - oreb;
      const ast = Math.round(clamp(base.ast * minScale * ratingScale * randF(0.5, 1.5) * (player.pos === 'PG' ? starMult : 1.0), 0, 20));
      const stl = Math.round(clamp(base.stl * minScale * randF(0.4, 1.8) * starMult, 0, 8));
      const blk = Math.round(clamp(base.blk * minScale * randF(0.3, 2.0) * (player.pos === 'C' ? starMult * 1.3 : starMult), 0, 10));
      const to = Math.round(clamp(randF(0.3, 3.5) * minScale, 0, 8));
      const pf = Math.round(clamp(randF(0.8, 4.5) * minScale, 0, 6));

      totalPts += pts;
      playerStats.push({ name: player.name, pos: player.pos, ovr: player.ovr, min: Math.round(minutes), pts, reb, oreb, dreb, ast, stl, blk, to, pf, fgm, fga, tpm, tpa, ftm, fta, rosterIdx: idx });
    });

    if (totalPts > 0 && totalPts !== targetScore) {
      // distribute normalization weighted by OVR so stars keep their share
      const totalOvr = playerStats.reduce((s, p) => s + p.ovr, 0);
      const diff = targetScore - totalPts;
      let distributed = 0;
      playerStats.forEach(ps => {
        const share = Math.round(diff * (ps.ovr / totalOvr));
        ps.pts += share;
        distributed += share;
      });
      const remain = targetScore - playerStats.reduce((s, p) => s + p.pts, 0);
      if (remain !== 0) {
        const top = playerStats.reduce((best, p) => p.ovr > best.ovr ? p : best, playerStats[0]);
        top.pts += remain;
      }
      // ensure no negative pts
      playerStats.forEach(ps => { if (ps.pts < 0) ps.pts = 0; });
    }
    return playerStats;
  }

  let hStats = simTeamStats(homeTeam, homeScore);
  let aStats = simTeamStats(awayTeam, awayScore);
  let hTotal = hStats.reduce((s, p) => s + p.pts, 0);
  let aTotal = aStats.reduce((s, p) => s + p.pts, 0);
  if (hTotal === aTotal) { hStats[rand(0, Math.min(4, hStats.length - 1))].pts += 2; hTotal += 2; }

  return { homeScore: hTotal, awayScore: aTotal, homeStats: hStats, awayStats: aStats };
}

function accumulateStats(team, gameStats) {
  gameStats.forEach(gs => {
    const player = team.players.find(p => p.name === gs.name);
    if (!player) return;
    const s = player.stats;
    s.gp++; s.pts += gs.pts; s.reb += gs.reb; s.oreb += gs.oreb; s.dreb += gs.dreb;
    s.ast += gs.ast; s.stl += gs.stl; s.blk += gs.blk; s.to += gs.to; s.pf += gs.pf;
    s.fgm += gs.fgm; s.fga += gs.fga; s.tpm += gs.tpm; s.tpa += gs.tpa;
    s.ftm += gs.ftm; s.fta += gs.fta; s.min += gs.min;
  });
}

function avg(val, gp) { return gp > 0 ? (val / gp).toFixed(1) : '0.0'; }
function pct(made, att) { return att > 0 ? (made / att * 100).toFixed(1) : '0.0'; }

// ─── Awards ───
function computeAllAwards(st) {
  const all = [];
  st.teams.forEach(team => {
    const wpct = team.wins / Math.max(team.wins + team.losses, 1);
    team.players.forEach((p, idx) => {
      if (p.stats.gp < 1) return;
      all.push({ ...p, teamName: team.name, teamColor: team.color, rosterIdx: idx, wpct });
    });
  });
  const score = (p, fn) => { const gp = p.stats.gp; return fn(p, gp); };
  const mvp = all.filter(p => p.stats.gp >= 5).map(p => ({ ...p, awardScore: score(p, (p, gp) => p.stats.pts/gp + (p.stats.reb/gp)*0.7 + (p.stats.ast/gp)*0.85 + (p.stats.stl/gp)*1.2 + p.stats.blk/gp + p.wpct*18) })).sort((a, b) => b.awardScore - a.awardScore).slice(0, 5);
  const dpoy = all.filter(p => p.stats.gp >= 5).map(p => ({ ...p, awardScore: score(p, (p, gp) => (p.stats.stl/gp)*2 + (p.stats.blk/gp)*2.5 + (p.stats.reb/gp)*0.4) })).sort((a, b) => b.awardScore - a.awardScore).slice(0, 5);
  const smoy = all.filter(p => p.rosterIdx >= 5 && p.stats.gp >= 5).map(p => ({ ...p, awardScore: score(p, (p, gp) => p.stats.pts/gp + (p.stats.reb/gp)*0.5 + (p.stats.ast/gp)*0.7) })).sort((a, b) => b.awardScore - a.awardScore).slice(0, 5);
  const mip = all.filter(p => p.ovr <= 80 && p.stats.gp >= 5).map(p => ({ ...p, awardScore: score(p, (p, gp) => p.stats.pts/gp - p.ovr*0.2 + (p.stats.reb/gp)*0.3 + (p.stats.ast/gp)*0.3) })).sort((a, b) => b.awardScore - a.awardScore).slice(0, 5);
  const roy = all.filter(p => p.ovr <= 75 && p.stats.gp >= 5).map(p => ({ ...p, awardScore: score(p, (p, gp) => p.stats.pts/gp + (p.stats.reb/gp)*0.5 + (p.stats.ast/gp)*0.5) })).sort((a, b) => b.awardScore - a.awardScore).slice(0, 5);
  return { mvp, dpoy, smoy, mip, roy };
}

function computeLeaders(st) {
  const all = [];
  st.teams.forEach(team => { team.players.forEach(p => { if (p.stats.gp >= 1) all.push({ ...p, teamName: team.name, teamColor: team.color }); }); });
  const topN = (key, n = 20) => [...all].sort((a, b) => (b.stats[key]/b.stats.gp) - (a.stats[key]/a.stats.gp)).slice(0, n);
  return { pts: topN('pts'), reb: topN('reb'), ast: topN('ast'), stl: topN('stl'), blk: topN('blk') };
}
