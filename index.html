function genCoach(){var names=COACH_NAMES_M.concat(COACH_NAMES_F);return{name:pick(names),style:pick(COACH_STYLES)}}

function generateNewTeamRoster(teamName){
  var td=NEW_TEAM_SEEDS[teamName];
  if(!td)return[];
  var positions=["PG","SG","SF","PF","C"];
  var extra=pick(["PG","SG","SF","PF","C"]);
  positions.push(extra);
  var roster=[];
  var seed=td.seed;
  for(var i=0;i<6;i++){
    var s=seed+i*137;
    var pos=positions[i];
    var ovr=td.ovrs[i];
    var age=seededR(s+1,20,28);
    var ht2=seededR(s+2,HT[pos][0],HT[pos][1]);
    var wt2=seededR(s+3,WT[pos][0],WT[pos][1]);
    var fn2=FN[Math.abs(seededR(s+4,0,FN.length-1))];
    var ln2=LN[Math.abs(seededR(s+5,0,LN.length-1))];
    var nm=fn2.toUpperCase()+" "+ln2.toUpperCase();
    var descs=["Talented young player","Versatile scorer","Defensive anchor","Athletic specimen","Developing star","High energy reserve"];
    roster.push({n:nm,p:pos,a:age,o:ovr,h:ht2,w:wt2,i:descs[i]});
  }
  return roster;
}

function initTeams(){
  var teams=[];
  var origNames=Object.keys(ROSTERS);
  var usedNames=new Set();

  // Original 18 teams
  origNames.forEach(function(name){
    var color=COLORS2[name]||"#666";
    var meta=TEAM_META[name]||{};
    var players=ROSTERS[name].map(function(r){return makePlayer(r.n,r.p,r.a,r.o,r.h,r.w,r.i)}).sort(function(a,b){return b.ovr-a.ovr});
    players.forEach(function(p){usedNames.add(p.name)});
    var totalSal=players.reduce(function(s,p){return s+p.salary},0);
    teams.push({name:name,color:color,players:players,wins:0,losses:0,arena:meta.arena,owner:meta.owner,city:meta.city,est:meta.est,emoji:meta.emoji,motto:meta.motto,capSpace:140000000-totalSal,championships:0,conf:getConf(name),coach:genCoach(),chemistry:75,gm:pick(GM_NAMES),ownerNetWorth:R(1500,8500),hotSeat:false});
  });

  // 12 new expansion teams
  var newTeamNames=Object.keys(NEW_TEAM_SEEDS);
  newTeamNames.forEach(function(name){
    var color=COLORS2[name]||"#666";
    var meta=TEAM_META[name]||{};
    var rosterData=generateNewTeamRoster(name);
    var players=rosterData.map(function(r){
      // ensure unique names
      var nm=r.n;
      if(usedNames.has(nm)){nm=nm+R(1,99)}
      usedNames.add(nm);
      return makePlayer(nm,r.p,r.a,r.o,r.h,r.w,r.i);
    }).sort(function(a,b){return b.ovr-a.ovr});
    var totalSal=players.reduce(function(s,p){return s+p.salary},0);
    teams.push({name:name,color:color,players:players,wins:0,losses:0,arena:meta.arena,owner:meta.owner,city:meta.city,est:meta.est,emoji:meta.emoji,motto:meta.motto,capSpace:140000000-totalSal,championships:0,conf:getConf(name),coach:genCoach(),chemistry:75,gm:pick(GM_NAMES),ownerNetWorth:R(1500,8500),hotSeat:false});
  });

  return teams;
}

  var n=teams.length,pairs=[],counts=new Array(n).fill(0);
  // intra-conference: ~4 games each, inter-conference: ~2 games each
  for(var i=0;i<n;i++){
    for(var j=i+1;j<n;j++){
      var sameConf=teams[i].conf===teams[j].conf;
      var reps=sameConf?3:2;
      for(var k=0;k<reps;k++){
        pairs.push({home:k%2===0?i:j,away:k%2===0?j:i});
        counts[i]++;counts[j]++;
      }
    }
  }
  // fill remaining to get closer to 82
  for(var pass=0;pass<200;pass++){
    var need=[];
    for(var i2=0;i2<n;i2++){if(counts[i2]<82)need.push({idx:i2,gap:82-counts[i2]})}
    need.sort(function(a,b){return b.gap-a.gap});
    if(need.length<2)break;
    var paired={};
    for(var x=0;x<need.length;x++){
      if(paired[need[x].idx])continue;
      for(var y=x+1;y<need.length;y++){
        if(paired[need[y].idx])continue;
        pairs.push({home:need[x].idx,away:need[y].idx});
        counts[need[x].idx]++;counts[need[y].idx]++;
        paired[need[x].idx]=true;paired[need[y].idx]=true;break;
      }
    }
  }
  // shuffle
  for(var i3=pairs.length-1;i3>0;i3--){var j3=R(0,i3);var tmp=pairs[i3];pairs[i3]=pairs[j3];pairs[j3]=tmp}
  var sched=[],assigned=new Array(pairs.length).fill(false),day=1,total=0;
  while(total<pairs.length){
    var busy={};
    for(var i4=0;i4<pairs.length;i4++){
      if(assigned[i4])continue;
      var g=pairs[i4];
      if(busy[g.home]||busy[g.away])continue;
      busy[g.home]=true;busy[g.away]=true;
      sched.push({home:g.home,away:g.away,day:day,result:null});
      assigned[i4]=true;total++;
    }
    day++;
  }
  return sched;
}

// Simulation with fixed stats
function simGame(ht,at,hl){
  var hp=ht.players.filter(function(p){return!p.injury||p.injury.games<=0});
  var ap=at.players.filter(function(p){return!p.injury||p.injury.games<=0});
  if(hp.length<3)hp=ht.players.slice(0,5);if(ap.length<3)ap=at.players.slice(0,5);
  var hO=hp.reduce(function(s,p){return s+p.ovr},0)/hp.length;
  var aO=ap.reduce(function(s,p){return s+p.ovr},0)/ap.length;
  // Chemistry factor
  hO=hO+((ht.chemistry||75)-75)*0.05;
  aO=aO+((at.chemistry||75)-75)*0.05;
  var diff=(hO-aO)*0.18,pace=RF(104,116),hadv=RF(2,4);
  var hT=Math.round(clamp(pace+diff+hadv+G(0,9),92,135)),aT=Math.round(clamp(pace-diff-hadv+G(0,9),92,135));
  function simT(pl,tgt){
    var st=[],tot=0;
    pl.forEach(function(p,i){
      var b=PB[p.pos]||PB.SF;
      var min=i<5?RF(30,38):i<8?RF(16,26):i<11?RF(6,16):RF(0,6);
      var ms=min/36,f=RF(0.6,1.4);
      var pw=Math.pow(p.ovr/78,2.2)*f;
      // FIXED: star multiplier capped lower for blocks/steals
      var star=p.ovr>=92?1.8:p.ovr>=87?1.5:p.ovr>=82?1.25:p.ovr>=77?1.1:1.0;
      var starBlk=Math.min(star,1.5);
      var starStl=Math.min(star,1.5);
      var u=(i<5?RF(0.10,0.21):RF(0.04,0.12))*pw;
      var fga=Math.round(clamp(u*85*ms,0,i<5?32:16));
      var fgp=clamp(0.34+(p.ovr-60)*0.005+G(0,0.06),0.28,0.62);
      var fgm=Math.round(fga*fgp);
      var tpa=Math.round(fga*RF(0.20,0.48));
      var tpp=clamp(0.27+(p.ovr-60)*0.004+G(0,0.07),0.20,0.48);
      var tpm=Math.round(tpa*tpp);
      var fta=Math.round(clamp(fga*RF(0.15,0.40),0,16));
      var ftp=clamp(0.60+(p.ovr-60)*0.008+G(0,0.08),0.50,0.95);
      var ftm=Math.round(fta*ftp);
      var pts=(fgm-tpm)*2+tpm*3+ftm;
      var rM=(p.pos==="C"||p.pos==="PF")?Math.min(star,1.3):1;
      var reb=Math.round(clamp(b.reb*ms*RF(0.5,1.4)*rM,0,18));
      var oreb=Math.round(reb*RF(0.12,0.35));
      var ast=Math.round(clamp(b.ast*ms*RF(0.5,1.3)*(p.pos==="PG"?Math.min(star,1.4):1),0,16));
      // FIXED: steals and blocks - reduced ranges and star impact
      var stl=Math.round(clamp(b.stl*ms*RF(0.3,1.5)*starStl,0,5));
      var blk=Math.round(clamp(b.blk*ms*RF(0.2,1.6)*starBlk,0,7));
      tot+=pts;
      st.push({name:p.name,pos:p.pos,ovr:p.ovr,ht:p.ht,wt:p.wt,min:Math.round(min),pts:pts,reb:reb,oreb:oreb,dreb:reb-oreb,ast:ast,stl:stl,blk:blk,to:Math.round(clamp(RF(0.3,3.5)*ms,0,8)),pf:Math.round(clamp(RF(0.8,4.5)*ms,0,6)),fgm:fgm,fga:fga,tpm:tpm,tpa:tpa,ftm:ftm,fta:fta,ri:i});
    });
    if(tot>0&&tot!==tgt){
      var tO=st.reduce(function(s,p){return s+p.ovr},0),d=tgt-tot;
      st.forEach(function(p){p.pts+=Math.round(d*(p.ovr/tO))});
      var rem=tgt-st.reduce(function(s,p){return s+p.pts},0);
      if(rem)(st.reduce(function(b,p){return p.ovr>b.ovr?p:b},st[0])).pts+=rem;
      st.forEach(function(p){if(p.pts<0)p.pts=0});
    }
    return st;
  }
  var hs=simT(hp,hT),as=simT(ap,aT);
  var hS=hs.reduce(function(s,p){return s+p.pts},0);
  var aS=as.reduce(function(s,p){return s+p.pts},0);
  if(hS===aS){hs[R(0,Math.min(4,hs.length-1))].pts+=2;hS+=2}
  // injuries
  if(hl){
    [hp,ap].forEach(function(pl,ti){
      var tn=ti===0?ht.name:at.name;
      pl.forEach(function(p){
        if(Math.random()<0.03){
          var g2=R(1,15);
          var ty=pick(["sprained ankle","knee soreness","hamstring strain","back tightness","shoulder injury","groin strain","calf strain"]);
          p.injury={games:g2,type:ty};
          hl.push({type:"injury",text:p.name+" ("+tn+") OUT "+g2+" games - "+ty,icon:"\uD83C\uDFE5"});
        }
      });
    });
    var all2=hs.concat(as);
    all2.forEach(function(ps){
      var tn2=hs.indexOf(ps)>=0?ht.name:at.name;
      if(ps.pts>=40)hl.push({type:"perf",text:ps.name+" ERUPTS for "+ps.pts+" PTS! ("+tn2+")",icon:"\uD83D\uDD25"});
      else if(ps.pts>=30)hl.push({type:"perf",text:ps.name+" drops "+ps.pts+" PTS ("+tn2+")",icon:"\u2B50"});
      if(ps.reb>=15)hl.push({type:"perf",text:ps.name+" grabs "+ps.reb+" REB ("+tn2+")",icon:"\uD83D\uDCAA"});
      if(ps.ast>=12)hl.push({type:"perf",text:ps.name+" dishes "+ps.ast+" AST ("+tn2+")",icon:"\uD83C\uDFAF"});
      if(ps.blk>=5)hl.push({type:"perf",text:ps.name+" BLOCKS "+ps.blk+" shots ("+tn2+")",icon:"\uD83D\uDEAB"});
      if(ps.pts>=10&&ps.reb>=10&&ps.ast>=10)hl.push({type:"mile",text:"TRIPLE-DOUBLE: "+ps.name+" "+ps.pts+"/"+ps.reb+"/"+ps.ast,icon:"\uD83D\uDCA5"});
    });
    if(Math.abs(hS-aS)<=3)hl.push({type:"game",text:"THRILLER! "+(hS>aS?ht.name:at.name)+" wins "+Math.max(hS,aS)+"-"+Math.min(hS,aS),icon:"\uD83D\uDE31"});
  }
  return{homeScore:hS,awayScore:aS,homeStats:hs,awayStats:as};
}

function accumStats(t,gs){(gs||[]).forEach(function(g){var p=t.players.find(function(x){return x.name===g.name});if(!p)return;var s=p.stats;s.gp++;s.pts+=g.pts;s.reb+=g.reb;s.oreb+=g.oreb;s.dreb+=g.dreb;s.ast+=g.ast;s.stl+=g.stl;s.blk+=g.blk;s.to+=g.to;s.pf+=g.pf;s.fgm+=g.fgm;s.fga+=g.fga;s.tpm+=g.tpm;s.tpa+=g.tpa;s.ftm+=g.ftm;s.fta+=g.fta;s.min+=g.min})}
function tickInj(teams){(teams||[]).forEach(function(t){(t.players||[]).forEach(function(p){if(p.injury&&p.injury.games>0)p.injury.games--;if(p.injury&&p.injury.games<=0)p.injury=null})})}

// Aging / Draft / Regression
function ageRetire(teams){
  var ret=[];
  (teams||[]).forEach(function(t){
    var rm=[];
    var teamWP=t.wins/Math.max(t.wins+t.losses,1);
    (t.players||[]).forEach(function(p,i){
      p.prevOvr=p.ovr;p.age++;
      // Good teams regression: top players on winning teams decline faster
      var regressionPenalty=0;
      if(teamWP>0.6&&p.ovr>=85)regressionPenalty=R(0,2);
      if(p.age<=25)p.ovr=Math.min(99,p.ovr+R(0,3)-regressionPenalty);
      else if(p.age<=30)p.ovr=clamp(p.ovr+R(-2,1)-regressionPenalty,50,99);
      else if(p.age<=33)p.ovr=Math.max(50,p.ovr+R(-3,0));
      else p.ovr=Math.max(45,p.ovr+R(-5,-1));
      p.ovr=Math.min(p.ovr,p.potential||99);
      if(!p.ovrHistory)p.ovrHistory=[];
      p.ovrHistory.push(p.ovr);
      p.contractYrs=Math.max(0,(p.contractYrs||1)-1);
      // Only retire at 38+
      var ch=0;
      if(p.age>=38)ch=1;else if(p.age>=37)ch=0.9;
      if(Math.random()<ch){rm.push(i);ret.push({name:p.name,pos:p.pos,age:p.age,ovr:p.ovr,ht:p.ht,wt:p.wt,team:t.name,teamColor:t.color,peakOvr:Math.max.apply(null,p.ovrHistory||[p.ovr]),reason:"retired"})}
    });
    rm.sort(function(a,b){return b-a}).forEach(function(i){t.players.splice(i,1)});
  });
  return ret;
}

function cutPlayers(teams,draftOrder){
  var ROSTER_LIMIT=8;
  var cuts=[];
  (teams||[]).forEach(function(t){
    // Count how many draft picks this team has
    var teamPicks=0;
    (draftOrder||[]).forEach(function(tn){if(tn===t.name)teamPicks++});
    if(teamPicks===0)teamPicks=1;
    var targetSize=ROSTER_LIMIT-teamPicks;
    if(targetSize<3)targetSize=3;
    // Auto-cut: players over 34 with OVR < 70
    var autoCutIdxs=[];
    (t.players||[]).forEach(function(p,i){
      if(p.age>34&&p.ovr<70)autoCutIdxs.push(i);
    });
    autoCutIdxs.sort(function(a,b){return b-a}).forEach(function(i){
      var p=t.players[i];
      cuts.push({name:p.name,pos:p.pos,ovr:p.ovr,age:p.age,ht:p.ht,wt:p.wt,team:t.name,teamColor:t.color,peakOvr:Math.max.apply(null,p.ovrHistory||[p.ovr]),reason:"waived"});
      t.players.splice(i,1);
    });
    // Now cut lowest OVR players to hit target, factoring in age
    while((t.players||[]).length>targetSize&&(t.players||[]).length>3){
      // Score each player: lower = more likely to be cut
      var worst=-1;var worstScore=9999;
      (t.players||[]).forEach(function(p,i){
        var score=p.ovr-(p.age>30?(p.age-30)*2:0);
        if(score<worstScore){worstScore=score;worst=i}
      });
      if(worst>=0){
        var p2=t.players[worst];
        cuts.push({name:p2.name,pos:p2.pos,ovr:p2.ovr,age:p2.age,ht:p2.ht,wt:p2.wt,team:t.name,teamColor:t.color,peakOvr:Math.max.apply(null,p2.ovrHistory||[p2.ovr]),reason:"waived"});
        t.players.splice(worst,1);
      } else {break}
    }
  });
  return cuts;
}

function runDraft(teams,nr,storedProspects){
  var np=(teams||[]).length,nP=Math.max(np,nr)+6,used=new Set();
  (teams||[]).forEach(function(t){(t.players||[]).forEach(function(p){used.add(p.name)})});
  var pros;
  if(storedProspects&&storedProspects.length>=nP){
    pros=storedProspects.slice();
    // add extra if needed
    while(pros.length<nP){
      var pos2=pick(["PG","SG","SF","PF","C"]),age2=R(19,22);
      var pct3=1-(pros.length/nP),ovr2=clamp(Math.round(62+pct3*26+G(0,4)),58,92);
      var nm2=genName(used);used.add(nm2);
      pros.push({name:nm2,pos:pos2,age:age2,ovr:ovr2,ht:R(HT[pos2][0],HT[pos2][1]),wt:R(WT[pos2][0],WT[pos2][1]),info:genScoutReport(pos2,ovr2),college:pick(COLLEGES),draftRank:pros.length+1});
    }
  } else {
    pros=[];
    for(var i=0;i<nP;i++){
      var pos=pick(["PG","SG","SF","PF","C"]),age=R(19,22);
      var pct2=1-(i/nP),ovr=clamp(Math.round(62+pct2*26+G(0,4)),58,92);
      var nm=genName(used);used.add(nm);
      var scoutRpts=genScoutReport(pos,ovr);
      pros.push({name:nm,pos:pos,age:age,ovr:ovr,ht:R(HT[pos][0],HT[pos][1]),wt:R(WT[pos][0],WT[pos][1]),info:scoutRpts,college:pick(COLLEGES),draftRank:i+1});
    }
  }
  pros.sort(function(a,b){return b.ovr-a.ovr});
  pros.forEach(function(p,i){p.draftRank=i+1});
  var sorted=(teams||[]).slice().sort(function(a,b){return(a.wins/Math.max(a.wins+a.losses,1))-(b.wins/Math.max(b.wins+b.losses,1))});
  var wts=sorted.map(function(_,i){return sorted.length-i+R(0,3)});
  var order=[],ui=new Set();
  while(order.length<sorted.length){
    var tt=0;for(var i2=0;i2<wts.length;i2++)if(!ui.has(i2))tt+=wts[i2];
    var r2=Math.random()*tt;
    for(var i3=0;i3<sorted.length;i3++){
      if(ui.has(i3))continue;r2-=wts[i3];
      if(r2<=0){order.push(sorted[i3]);ui.add(i3);break}
    }
    if(ui.size<order.length+1){for(var i4=0;i4<sorted.length;i4++){if(!ui.has(i4)){order.push(sorted[i4]);ui.add(i4)}}}
  }
  var picks=[],avail=pros.slice();
  order.forEach(function(tm,pi){
    if(!avail.length)return;
    var ch=avail.shift();
    var draftedP=makePlayer(ch.name,ch.pos,ch.age,ch.ovr,ch.ht,ch.wt,ch.info);
    draftedP.rookie=true;
    tm.players.push(draftedP);
    tm.players.sort(function(a,b){return b.ovr-a.ovr});
    picks.push({pick:pi+1,team:tm.name,teamColor:COLORS2[tm.name]||"#666",player:ch});
  });
  return{picks:picks,undrafted:avail};
}

// Playoffs: Conference-based, 4 rounds
function initPO(teams){
  var east=(teams||[]).filter(function(t){return t.conf==="EAST"}).sort(function(a,b){return(b.wins/Math.max(b.wins+b.losses,1))-(a.wins/Math.max(a.wins+a.losses,1))||b.wins-a.wins}).slice(0,8);
  var west=(teams||[]).filter(function(t){return t.conf==="WEST"}).sort(function(a,b){return(b.wins/Math.max(b.wins+b.losses,1))-(a.wins/Math.max(a.wins+a.losses,1))||b.wins-a.wins}).slice(0,8);
  function makeBracket(s){
    return[
      {hN:s[0].name,lN:s[7].name,hW:0,lW:0,g:[]},
      {hN:s[1].name,lN:s[6].name,hW:0,lW:0,g:[]},
      {hN:s[2].name,lN:s[5].name,hW:0,lW:0,g:[]},
      {hN:s[3].name,lN:s[4].name,hW:0,lW:0,g:[]}
    ];
  }
  return{
    round:"quarters",
    eastBracket:{quarters:makeBracket(east),semis:null,confFinals:null},
    westBracket:{quarters:makeBracket(west),semis:null,confFinals:null},
    finals:null,
    champ:null,
    eastSeeds:east.map(function(t){return{name:t.name,color:COLORS2[t.name]}}),
    westSeeds:west.map(function(t){return{name:t.name,color:COLORS2[t.name]}})

}

function simPOGame(st,conf,round,muIdx){
  var po=st.playoffs;if(!po)return;
  var mu;
  if(round==="finals"){
    mu=po.finals;
  } else {
    var bracket=conf==="EAST"?po.eastBracket:po.westBracket;
    if(round==="quarters")mu=(bracket.quarters||[])[muIdx];
    else if(round==="semis")mu=(bracket.semis||[])[muIdx];
    else if(round==="confFinals")mu=bracket.confFinals;
  }
  if(!mu)return;
  var hT2=st.teams.find(function(t){return t.name===mu.hN});
  var aT2=st.teams.find(function(t){return t.name===mu.lN});
  if(!hT2||!aT2)return;
  var gArr=(mu.g||[]);
  var home=gArr.length%2===0?hT2:aT2;
  var away=home===hT2?aT2:hT2;
  if(!st.headlines)st.headlines=[];
  var r2=simGame(home,away,st.headlines);
  if(!mu.g)mu.g=[];
  mu.g.push(r2);
  var hWon=(home===hT2&&r2.homeScore>r2.awayScore)||(away===hT2&&r2.awayScore>r2.homeScore);
  if(hWon)mu.hW++;else mu.lW++;
  accumStats(home,r2.homeStats);accumStats(away,r2.awayStats);tickInj(st.teams);

  if(mu.hW>=4||mu.lW>=4){
    var winner=mu.hW>=4?mu.hN:mu.lN;
    st.headlines.push({type:"po",text:winner+" wins the "+round+" series!",icon:"\uD83C\uDFC0"});

    if(round==="finals"){
      po.champ={name:winner,color:COLORS2[winner]};po.round="done";
      st.headlines.push({type:"po",text:winner+" are the MDBA CHAMPIONS!",icon:"\uD83C\uDFC6"});
    } else {
      // Advance within conference bracket
      var brk=conf==="EAST"?po.eastBracket:po.westBracket;
      if(round==="quarters"){
        if((brk.quarters||[]).every(function(m){return m.hW>=4||m.lW>=4})){
          var w=(brk.quarters||[]).map(function(m){return m.hW>=4?m.hN:m.lN});
          brk.semis=[{hN:w[0],lN:w[3],hW:0,lW:0,g:[]},{hN:w[1],lN:w[2],hW:0,lW:0,g:[]}];
          // check if other conf also done quarters
          var otherBrk=conf==="EAST"?po.westBracket:po.eastBracket;
          if((otherBrk.quarters||[]).every(function(m){return m.hW>=4||m.lW>=4})&&otherBrk.semis){
            po.round="semis";
          } else if((otherBrk.quarters||[]).every(function(m){return m.hW>=4||m.lW>=4})){
            po.round="semis";
          }
          st.headlines.push({type:"po",text:conf+" Conference Semis set!",icon:"\uD83D\uDD25"});
        }
      } else if(round==="semis"){
        if((brk.semis||[]).every(function(m){return m.hW>=4||m.lW>=4})){
          var w2=(brk.semis||[]).map(function(m){return m.hW>=4?m.hN:m.lN});
          brk.confFinals={hN:w2[0],lN:w2[1],hW:0,lW:0,g:[]};
          st.headlines.push({type:"po",text:conf+" Conference Finals: "+w2[0]+" vs "+w2[1],icon:"\uD83D\uDD25"});
        }
      } else if(round==="confFinals"){
        // check if both conf finals done
        var eBrk=po.eastBracket,wBrk=po.westBracket;
        if(eBrk.confFinals&&wBrk.confFinals){
          var eDone=eBrk.confFinals.hW>=4||eBrk.confFinals.lW>=4;
          var wDone=wBrk.confFinals.hW>=4||wBrk.confFinals.lW>=4;
          if(eDone&&wDone){
            var eWin=eBrk.confFinals.hW>=4?eBrk.confFinals.hN:eBrk.confFinals.lN;
            var wWin=wBrk.confFinals.hW>=4?wBrk.confFinals.hN:wBrk.confFinals.lN;
            po.finals={hN:eWin,lN:wWin,hW:0,lW:0,g:[]};
            po.round="finals";
            st.headlines.push({type:"po",text:"MDBA FINALS: "+eWin+" vs "+wWin,icon:"\uD83D\uDD25"});
          }
        }
      }
    }
  }
}

// All-Star
function runAllStar(st){
  var all=[];(st.teams||[]).forEach(function(t){(t.players||[]).forEach(function(p){if(p.stats.gp>=5){var gp=p.stats.gp;all.push({name:p.name,pos:p.pos,ovr:p.ovr,team:t.name,color:COLORS2[t.name],score:p.ovr*2+p.stats.pts/gp+p.stats.ast/gp*0.5,ht:p.ht,ppg:p.stats.pts/gp,conf:t.conf})}})});
  all.sort(function(a,b){return b.score-a.score});
  var starters=all.slice(0,10);
  var teamA=starters.filter(function(_,i){return i%2===0});
  var teamB=starters.filter(function(_,i){return i%2!==0});

// Firebase array fix - comprehensive
function fixArrays(v){
  try{
    if(v===null||v===undefined)return;
    function fixArr(obj,key){
      if(obj&&obj[key]===null)obj[key]=[];
      if(obj&&obj[key]&&!Array.isArray(obj[key]))obj[key]=Object.values(obj[key]);
    }
    fixArr(v,"teams");fixArr(v,"schedule");fixArr(v,"history");fixArr(v,"freeAgents");
    fixArr(v,"allRetired");fixArr(v,"headlines");fixArr(v,"allTimeAwards");fixArr(v,"allTimeStatLeaders");fixArr(v,"hallOfFame");
    fixArr(v,"upcomingProspects");fixArr(v,"draftHistory");fixArr(v,"draftLotteryOrder");fixArr(v,"draftProspects");fixArr(v,"draftPicks");fixArr(v,"draftCuts");fixArr(v,"socialPosts");
    if(v.teams)(v.teams||[]).forEach(function(t){
      fixArr(t,"players");
      if(t.players)(t.players||[]).forEach(function(p){
        fixArr(p,"strengths");fixArr(p,"ovrHistory");fixArr(p,"careerStats");fixArr(p,"hobbies");
      });
    });
    if(v.schedule)(v.schedule||[]).forEach(function(g){
      if(g&&g.result){
        fixArr(g.result,"homeStats");fixArr(g.result,"awayStats");
      }
    });
    if(v.playoffs){
      var po=v.playoffs;
      // east bracket
      if(po.eastBracket){
        fixArr(po.eastBracket,"quarters");
        fixArr(po.eastBracket,"semis");
        if(po.eastBracket.quarters)(po.eastBracket.quarters||[]).forEach(function(m){if(m){fixArr(m,"g");if(!m.g)m.g=[]}});
        if(po.eastBracket.semis)(po.eastBracket.semis||[]).forEach(function(m){if(m){fixArr(m,"g");if(!m.g)m.g=[]}});
        if(po.eastBracket.confFinals){fixArr(po.eastBracket.confFinals,"g");if(!po.eastBracket.confFinals.g)po.eastBracket.confFinals.g=[]}
      }
      // west bracket
      if(po.westBracket){
        fixArr(po.westBracket,"quarters");
        fixArr(po.westBracket,"semis");
        if(po.westBracket.quarters)(po.westBracket.quarters||[]).forEach(function(m){if(m){fixArr(m,"g");if(!m.g)m.g=[]}});
        if(po.westBracket.semis)(po.westBracket.semis||[]).forEach(function(m){if(m){fixArr(m,"g");if(!m.g)m.g=[]}});
        if(po.westBracket.confFinals){fixArr(po.westBracket.confFinals,"g");if(!po.westBracket.confFinals.g)po.westBracket.confFinals.g=[]}
      }
      if(po.finals){fixArr(po.finals,"g");if(!po.finals.g)po.finals.g=[]}
      fixArr(po,"eastSeeds");fixArr(po,"westSeeds");
    }
    if(v.lastDraft){
      fixArr(v.lastDraft,"picks");fixArr(v.lastDraft,"undrafted");
    }
    fixArr(v,"lastRetired");
    if(v.draftHistory)(v.draftHistory||[]).forEach(function(dh){if(dh){fixArr(dh,"picks");fixArr(dh,"cuts")}});
    if(v.allStar){
      fixArr(v.allStar,"teamA");fixArr(v.allStar,"teamB");
      fixArr(v.allStar,"tpc");fixArr(v.allStar,"dunk");
    }
  }catch(e){/* fail silently */}
}

function generateProspects(teams){
  var used=new Set();
  var allPlayers=[];
  (teams||[]).forEach(function(t){(t.players||[]).forEach(function(p){used.add(p.name);allPlayers.push({name:p.name,pos:p.pos,ovr:p.ovr,team:t.name})})});
  var pros=[];
  var classRoll=Math.random();
  var isGenerational=classRoll<0.05;
  var isStrong=!isGenerational&&classRoll<0.25;
  for(var i=0;i<24;i++){
    var pos=pick(["PG","SG","SF","PF","C"]),age=R(19,22);
    var pct2=1-(i/24),ovr=clamp(Math.round(62+pct2*20+G(0,4)),58,76);
    if(i===0&&isGenerational){ovr=clamp(Math.round(88+G(0,2)),88,92)}
    else if(i===0&&isStrong){ovr=clamp(Math.round(83+G(0,2)),83,87)}
    else if(i===0){ovr=clamp(Math.round(78+G(0,2.5)),78,83)}
    else if(i===1){ovr=Math.min(ovr+R(3,8),isStrong?84:80)}
    else{ovr=Math.min(ovr,isStrong?80:76)}
    var nm=genName(used);used.add(nm);
    // Find a comparison player of same position with similar OVR
    var compText="";
    var samePosPlayers=allPlayers.filter(function(cp){return cp.pos===pos});
    if(samePosPlayers.length>0){
      samePosPlayers.sort(function(a,b){return Math.abs(a.ovr-ovr)-Math.abs(b.ovr-ovr)});
      var compP=samePosPlayers[R(0,Math.min(2,samePosPlayers.length-1))];
      compText="Draws comparisons to "+compP.name+" ("+compP.team+")";
    }
    var report=genScoutReport(pos,ovr,compText);
    pros.push({name:nm,pos:pos,age:age,ovr:ovr,ht:R(HT[pos][0],HT[pos][1]),wt:R(WT[pos][0],WT[pos][1]),info:report,college:pick(COLLEGES),draftRank:i+1,comparison:compText});
  }
  pros.sort(function(a,b){return b.ovr-a.ovr});
  pros.forEach(function(p,i){p.draftRank=i+1});
  return pros;
}

function generateBlockbusterTrade(teamAIdx,teamBIdx,teams){
  var tA=teams[teamAIdx];var tB=teams[teamBIdx];
  if(!tA||!tB)return null;
  var plA=(tA.players||[]).slice();var plB=(tB.players||[]).slice();
  function playerValue(p){return p.ovr*1.0+(p.potential||p.ovr)*0.3-p.age*0.5+((p.contractYrs||1)<2?5:0)}
  // Find star player (85+ OVR) on either team
  var starA=null;var starB=null;
  plA.forEach(function(p){if(p.ovr>=85&&(!starA||p.ovr>starA.ovr))starA=p});
  plB.forEach(function(p){if(p.ovr>=85&&(!starB||p.ovr>starB.ovr))starB=p});
  // Pick the higher OVR star, or whichever exists
  var starTeam,starPlayer,otherTeam,otherPlayers,starTeamName,otherTeamName;
  if(starA&&starB){
    if(starA.ovr>=starB.ovr){starTeam=tA;starPlayer=starA;otherTeam=tB;otherPlayers=plB;starTeamName=tA.name;otherTeamName=tB.name}
    else{starTeam=tB;starPlayer=starB;otherTeam=tA;otherPlayers=plA;starTeamName=tB.name;otherTeamName=tA.name}
  } else if(starA){starTeam=tA;starPlayer=starA;otherTeam=tB;otherPlayers=plB;starTeamName=tA.name;otherTeamName=tB.name}
  else if(starB){starTeam=tB;starPlayer=starB;otherTeam=tA;otherPlayers=plA;starTeamName=tB.name;otherTeamName=tA.name}
  else{
    // No star players, pick best from each
    var bestA=plA.slice().sort(function(a,b){return b.ovr-a.ovr})[0];
    if(!bestA)return null;
    starTeam=tA;starPlayer=bestA;otherTeam=tB;otherPlayers=plB;starTeamName=tA.name;otherTeamName=tB.name;
  }
  // Build package from other team: 2-3 players roughly matching star value
  var starVal=playerValue(starPlayer);
  var targetVal=starVal*0.85;
  var candidates=otherPlayers.filter(function(p){return p.name!==starPlayer.name}).sort(function(a,b){return playerValue(b)-playerValue(a)});
  var pkg=[];var pkgVal=0;
  for(var ci=0;ci<candidates.length&&pkg.length<3;ci++){
    var cv=playerValue(candidates[ci]);
    if(pkgVal+cv<=targetVal*1.4||pkg.length===0){
      pkg.push(candidates[ci]);pkgVal+=cv;
      if(pkgVal>=targetVal*0.7&&pkg.length>=2)break;
    }
  }
  if(pkg.length===0)return null;
  // Calculate grades
  var valDiff=pkgVal-starVal;
  var gradeForStarTeam,gradeForOtherTeam;
  if(valDiff>10){gradeForStarTeam="A+";gradeForOtherTeam="B-"}
  else if(valDiff>5){gradeForStarTeam="A";gradeForOtherTeam="B"}
  else if(valDiff>0){gradeForStarTeam="A-";gradeForOtherTeam="B+"}
  else if(valDiff>-5){gradeForStarTeam="B+";gradeForOtherTeam="A-"}
  else if(valDiff>-10){gradeForStarTeam="B";gradeForOtherTeam="A"}
  else{gradeForStarTeam="B-";gradeForOtherTeam="A+"}
  // Generate rationale
  var pkgNames=pkg.map(function(p){return p.name}).join(", ");
  var reasonStar="Gets a franchise cornerstone in "+starPlayer.name+" ("+starPlayer.ovr+" OVR), immediately becomes a contender. ";
  if(starPlayer.age<=25)reasonStar=reasonStar+starPlayer.name+" is only "+starPlayer.age+" and has years of prime left.";
  else reasonStar=reasonStar+starPlayer.name+" is a proven winner who elevates any roster.";
  var reasonOther="Gets younger and acquires assets with "+pkgNames+". ";
  var youngCount=pkg.filter(function(p){return p.age<=24}).length;
  if(youngCount>=2)reasonOther=reasonOther+"Adds "+youngCount+" young players with upside for a rebuild.";
  else reasonOther=reasonOther+"Creates flexibility for the future while adding depth.";
  return{
    starPlayer:starPlayer,starTeam:starTeamName,
    package:pkg,packageTeam:otherTeamName,
    starValue:starVal,packageValue:pkgVal,
    gradeStarTeam:gradeForOtherTeam,gradePackageTeam:gradeForStarTeam,
    reasonStarTeam:reasonStar,reasonPackageTeam:reasonOther,
    starTeamIdx:teams.indexOf(starTeam),packageTeamIdx:teams.indexOf(otherTeam)
  };
}

    }

        fa.push(makePlayer(c.name,c.pos,c.age||25,c.ovr,c.ht,c.wt,"Former "+c.team+" player"));
      }

    // Save lastDraft for compatibility
    n.lastDraft={picks:(n.draftPicks||[]).slice(),undrafted:undrafted};
    // Free agent signing / luxury tax logic
    (n.teams||[]).forEach(function(t){
      t.wins=0;t.losses=0;t.hotSeat=false;
      var totalPayroll=(t.players||[]).reduce(function(s,p){return s+(p.salary||0)},0);
      var luxuryLine=170000000;
      (t.players||[]).forEach(function(p){
        p.stats=emptyStats();p.injury=null;
        if(p.contractYrs<=0){
          p.salary=genSalary(p.ovr,p.age);
          p.contractYrs=R(1,4);
          if(totalPayroll>luxuryLine){
            p.salary=Math.round(p.salary*0.6);
            p.contractYrs=Math.min(p.contractYrs,2);
          }
        }
      });
      t.capSpace=140000000-(t.players||[]).reduce(function(s,p){return s+p.salary},0);

        ldr._priorAdded=true;
      }
    })});
    n.schedule=genSchedule(n.teams);n.currentDay=1;n.done=false;
    n.seasonNum=(n.seasonNum||2026)+1;n.freeAgents=fa;
    n.playoffs=null;n.allStar=null;n.phase="season";n.headlines=[];

  }

  // Trades view
  function vTrades(){
    var teams=state.teams||[];
    var tA=teams[_trA];
    var tB=teams[_trB];
    var selPA=(_trPA||[]);
    var selPB=(_trPB||[]);
    var totalOvrA=selPA.reduce(function(s,i){return s+((tA&&tA.players[i])?tA.players[i].ovr:0)},0);
    var totalOvrB=selPB.reduce(function(s,i){return s+((tB&&tB.players[i])?tB.players[i].ovr:0)},0);
    var totalSalA=selPA.reduce(function(s,i){return s+((tA&&tA.players[i])?(tA.players[i].salary||0):0)},0);
    var totalSalB=selPB.reduce(function(s,i){return s+((tB&&tB.players[i])?(tB.players[i].salary||0):0)},0);
    var fairDiff=Math.abs(totalOvrA-totalOvrB);
    var fairColor=fairDiff<=5?"#3fb950":fairDiff<=15?"#d29922":"#f85149";
    var fairText=fairDiff<=5?"FAIR TRADE":fairDiff<=15?"SLIGHTLY UNEVEN":"UNFAIR TRADE";

    function togglePA(idx){var arr=selPA.slice();var ix=arr.indexOf(idx);if(ix>=0)arr.splice(ix,1);else arr.push(idx);setTrPA(arr)}
    function togglePB(idx){var arr=selPB.slice();var ix=arr.indexOf(idx);if(ix>=0)arr.splice(ix,1);else arr.push(idx);setTrPB(arr)}

    function executeTrade(){
      if(!tA||!tB||selPA.length===0||selPB.length===0)return;
      var n=DC(state);
      var nA=n.teams[_trA],nB=n.teams[_trB];
      var movingFromA=[];var movingFromB=[];
      selPA.sort(function(a,b){return b-a}).forEach(function(i){movingFromA.push(nA.players.splice(i,1)[0])});
      selPB.sort(function(a,b){return b-a}).forEach(function(i){movingFromB.push(nB.players.splice(i,1)[0])});
      movingFromA.forEach(function(p){p.morale=Math.max(10,(p.morale||70)-10);p.tradeDemand=false;nB.players.push(p)});
      movingFromB.forEach(function(p){p.morale=Math.max(10,(p.morale||70)-10);p.tradeDemand=false;nA.players.push(p)});
      nA.players.forEach(function(p){p.morale=Math.min(100,(p.morale||70)+5)});
      nB.players.forEach(function(p){p.morale=Math.min(100,(p.morale||70)+5)});
      // Chemistry adjustments
      var avgOvrFromA=movingFromA.reduce(function(s,p){return s+p.ovr},0)/(movingFromA.length||1);
      var avgOvrFromB=movingFromB.reduce(function(s,p){return s+p.ovr},0)/(movingFromB.length||1);
      if(avgOvrFromA>avgOvrFromB){nB.chemistry=Math.min(100,(nB.chemistry||75)+3);nA.chemistry=Math.max(30,(nA.chemistry||75)-5)}
      else if(avgOvrFromB>avgOvrFromA){nA.chemistry=Math.min(100,(nA.chemistry||75)+3);nB.chemistry=Math.max(30,(nB.chemistry||75)-5)}
      nA.players.sort(function(a,b){return b.ovr-a.ovr});
      nB.players.sort(function(a,b){return b.ovr-a.ovr});
      if(!n.headlines)n.headlines=[];
      var namesA=movingFromA.map(function(p){return p.name}).join(", ");
      var namesB=movingFromB.map(function(p){return p.name}).join(", ");
      n.headlines.push({type:"trade",text:"TRADE: "+nA.name+" sends "+namesA+" to "+nB.name+" for "+namesB+"!",icon:"\uD83D\uDD04"});
      setTrPA([]);setTrPB([]);sync(n);
    }

    function suggestTrade(){
      if(!tA||!tB)return;
      var plA=(tA.players||[]).slice();
      var plB=(tB.players||[]).slice();
      var bestPair=null;var bestDiff=999;
      for(var i=0;i<plA.length;i++){
        for(var j=0;j<plB.length;j++){
          var d=Math.abs(plA[i].ovr-plB[j].ovr);
          if(d<=5){
            var salDiff=Math.abs((plA[i].salary||0)-(plB[j].salary||0));
            var score=d*2+salDiff/1000000;
            if(score<bestDiff){bestDiff=score;bestPair={a:i,b:j}}
          }
        }
      }
      if(bestPair){setTrPA([bestPair.a]);setTrPB([bestPair.b])}
    }

    function teamSel(val,setter,otherVal){
      return h("select",{value:val,style:{background:"#21262d",color:"#e6edf3",border:"1px solid #30363d",borderRadius:6,padding:"6px 10px",fontSize:13},onChange:function(e){setter(parseInt(e.target.value));setTrPA([]);setTrPB([])}},
        teams.map(function(t,i){return h("option",{key:i,value:i,disabled:i===otherVal},t.name)}));
    }

    function playerList(team,selected,toggle){
      if(!team)return null;
      return (team.players||[]).map(function(p,i){
        var sel=selected.indexOf(i)>=0;
        return h("div",{key:p.name,onClick:function(){toggle(i)},style:{padding:"6px 10px",background:sel?"#1b3a25":"#0d1117",border:sel?"2px solid #3fb950":"1px solid #21262d",borderRadius:6,marginBottom:3,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12}},
          h("span",{style:{color:"#e6edf3"}},p.name," ",p.pos),
          h("span",null,oB(p.ovr),h("span",{className:"salary",style:{marginLeft:6}},salStr(p.salary||0)))
        );
      });
    }

          todayGames.slice(0,8).map(function(g,i){
            var aw=(state.teams||[])[g.away],hm=(state.teams||[])[g.home];
            if(!aw||!hm)return null;
            return h("div",{key:i,style:{padding:"8px 10px",background:"#0d1117",borderRadius:8,border:"1px solid #21262d",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12}},
              h("span",{style:{color:"#e6edf3"}},teamEmoji(aw.name)+" "+(aw.name||"").split(" ").pop()+" ("+aw.wins+"-"+aw.losses+")"),
              h("span",{style:{color:"#484f58",fontSize:10,fontWeight:700}},"@"),
              h("span",{style:{color:"#e6edf3"}},teamEmoji(hm.name)+" "+(hm.name||"").split(" ").pop()+" ("+hm.wins+"-"+hm.losses+")")
            );
          })
        )
      ):null,
      // League Leaders Cards
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12,marginBottom:16}},
        scoreLdr.length>0?h("div",{className:"card",style:{marginBottom:0,textAlign:"center"}},
          h("div",{style:{fontSize:10,color:"#FFD700",fontWeight:700,letterSpacing:1}},"PPG LEADER"),
          h("div",{style:{marginTop:6}},avatar(scoreLdr[0].name,scoreLdr[0].color,40)),
          h("div",{style:{fontWeight:700,color:"#e6edf3",fontSize:13,marginTop:4}},scoreLdr[0].name),
          h("div",{style:{fontSize:20,fontWeight:800,color:"#FFD700",marginTop:2}},scoreLdr[0].ppg.toFixed(1))
        ):null,
        rebLdr.length>0?h("div",{className:"card",style:{marginBottom:0,textAlign:"center"}},
          h("div",{style:{fontSize:10,color:"#3fb950",fontWeight:700,letterSpacing:1}},"RPG LEADER"),
          h("div",{style:{marginTop:6}},avatar(rebLdr[0].name,rebLdr[0].color,40)),
          h("div",{style:{fontWeight:700,color:"#e6edf3",fontSize:13,marginTop:4}},rebLdr[0].name),
          h("div",{style:{fontSize:20,fontWeight:800,color:"#3fb950",marginTop:2}},rebLdr[0].rpg.toFixed(1))
        ):null,
        astLdr.length>0?h("div",{className:"card",style:{marginBottom:0,textAlign:"center"}},
          h("div",{style:{fontSize:10,color:ACCENT,fontWeight:700,letterSpacing:1}},"APG LEADER"),
          h("div",{style:{marginTop:6}},avatar(astLdr[0].name,astLdr[0].color,40)),
          h("div",{style:{fontWeight:700,color:"#e6edf3",fontSize:13,marginTop:4}},astLdr[0].name),
          h("div",{style:{fontSize:20,fontWeight:800,color:ACCENT,marginTop:2}},astLdr[0].apg.toFixed(1))
        ):null,
        blkLdr.length>0?h("div",{className:"card",style:{marginBottom:0,textAlign:"center"}},
          h("div",{style:{fontSize:10,color:"#da3633",fontWeight:700,letterSpacing:1}},"BPG LEADER"),
          h("div",{style:{marginTop:6}},avatar(blkLdr[0].name,blkLdr[0].color,40)),
          h("div",{style:{fontWeight:700,color:"#e6edf3",fontSize:13,marginTop:4}},blkLdr[0].name),
          h("div",{style:{fontSize:20,fontWeight:800,color:"#da3633",marginTop:2}},blkLdr[0].bpg.toFixed(1))
        ):null
      ),
      // Hot/Cold + Injury Report
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}},
        h("div",{className:"card",style:{marginBottom:0}},
          h("h3",{style:{fontSize:13,color:ACCENT,marginBottom:8}},"\uD83D\uDD25 Hot / \u2744\uFE0F Cold Teams"),
          hotTeam&&hotTeam.streak>=2?h("div",{style:{padding:"6px 10px",background:"#1b3a25",borderRadius:8,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12}},
            h("span",{style:{color:"#3fb950"}},hotTeam.emoji+" "+hotTeam.name),
            h("span",{style:{color:"#3fb950",fontWeight:700}},"\uD83D\uDD25 "+hotTeam.streak+"W streak")
          ):h("div",{style:{fontSize:12,color:"#8b949e",padding:"4px 0"}},"No significant win streaks"),
          coldTeam&&coldTeam.streak>=2?h("div",{style:{padding:"6px 10px",background:"#3d1f1f",borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12}},
            h("span",{style:{color:"#f85149"}},coldTeam.emoji+" "+coldTeam.name),
            h("span",{style:{color:"#f85149",fontWeight:700}},"\u2744\uFE0F "+coldTeam.streak+"L streak")
          ):h("div",{style:{fontSize:12,color:"#8b949e",padding:"4px 0"}},"No significant losing streaks")
        ),
        h("div",{className:"card",style:{marginBottom:0}},
          h("h3",{style:{fontSize:13,color:"#da3633",marginBottom:8}},"\uD83C\uDFE5 Injury Report"),
          topInjured.length>0?topInjured.map(function(inj,i){
            return h("div",{key:inj.name+i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0",fontSize:11}},
              h("span",{style:{color:"#e6edf3"}},inj.name+" ",oB(inj.ovr)),
              h("span",{style:{color:"#da3633",fontSize:10}},inj.type+" ("+inj.games+"G)")
            );
          }):h("div",{style:{fontSize:12,color:"#8b949e"}},"No major injuries")
        )
      ),
      // Headlines
      hl.length>0?h("div",{className:"card",style:{marginBottom:16}},
        h("h3",{style:{fontSize:14,color:ACCENT,marginBottom:8}},"\uD83D\uDCF0 Recent Headlines"),
        h("div",{style:{maxHeight:200,overflowY:"auto"}},
          hl.map(function(x,i){return h("div",{key:i,className:"headline",style:{color:"#e6edf3",fontSize:12,animation:"fadeIn 0.3s ease-out",animationDelay:(i*0.05)+"s",animationFillMode:"both"}},((x||{}).icon||"")+" "+((x||{}).text||""))})
        )
      ):null,
      // Social Media Preview
      recentPosts.length>0?h("div",{className:"card"},
        h("h3",{style:{fontSize:14,color:ACCENT,marginBottom:8}},"\uD83D\uDCF1 Latest Social"),
        recentPosts.map(function(post,i){
          return h("div",{key:i,style:{padding:"8px 10px",background:"#0d1117",borderRadius:8,marginBottom:6,border:"1px solid #21262d",display:"flex",alignItems:"center",gap:8,fontSize:12}},
            avatar(post.player||"?",post.color||"#666",24),
            h("span",{style:{fontWeight:600,color:"#e6edf3"}},post.player||"Unknown"),
            h("span",{style:{color:"#8b949e",flex:1}},post.text||"")
          );
        }),
        h("div",{style:{textAlign:"right",marginTop:4}},
          h("span",{className:"plink",style:{fontSize:12},onClick:function(){setView("social");setSub(null)}},"See more \u2192"))
      ):null
    );
  }

  // Social Media
  function vSocial(){
    var posts=(state.socialPosts||[]).slice().reverse().slice(0,30);
    return h("div",{className:"card fade-in"},
      h("h2",{style:{marginBottom:16,color:ACCENT}},"\uD83D\uDCF1 Social Media Feed"),
      h("button",{style:{background:PRIMARY,color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontWeight:600,fontSize:12,cursor:"pointer",marginBottom:12},onClick:function(){var n=DC(state);generateSocialPosts(n);sync(n)}},"Refresh Feed"),
      posts.length===0?h("p",{style:{color:"#8b949e"}},"No posts yet. Sim some games first!"):
      posts.map(function(post,i){
        return h("div",{key:i,style:{padding:"12px 16px",background:i%2===0?"#0d1117":"#1c2128",borderRadius:10,marginBottom:8,border:"1px solid #30363d"}},
          h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:6}},
            avatar(post.player||"?",post.color||"#666",28),
            h("span",{style:{fontWeight:700,color:"#e6edf3",fontSize:13}},post.player||"Unknown"),
            h("span",{style:{fontSize:11,color:"#8b949e"}},post.team||"")
          ),
          h("div",{style:{fontSize:13,color:"#e6edf3",lineHeight:1.5}},post.text||"")
        );
      })
    );
  }

  // Hall of Fame standalone view
  function vHallOfFame(){
    var hof=(state.hallOfFame||[]).slice().reverse();
    return h("div",{className:"card fade-in"},
      h("h2",{style:{marginBottom:16,color:"#FFD700"}},"\uD83C\uDFDB Hall of Fame ("+hof.length+")"),
      hof.length===0?h("p",{style:{color:"#8b949e"}},"No inductees yet. Players are inducted when they retire with peak OVR >= 85 and 6+ years, or peak OVR >= 90 and 4+ years."):
      hof.map(function(p,i){
        return h("div",{key:(p.name||"")+i,style:{padding:"10px 14px",background:i%2===0?"#0d1117":"#1c2128",borderRadius:8,marginBottom:4,border:"1px solid #30363d",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},
          h("span",{style:{color:"#FFD700",fontWeight:700,fontSize:16}},"\u2605"),
          h("span",{style:{fontWeight:700,color:"#e6edf3",fontSize:14}},p.name),
          oB(p.peakOvr),
          h("span",{style:{fontSize:12,color:"#8b949e"}},p.pos+" | Peak: "+p.peakOvr+" OVR | Retired at "+(p.retiredAge||"?")+" | "+p.team),
          h("span",{style:{fontSize:11,color:"#6e7681"}},"Inducted "+p.inductedSeason)
        );
      })
    );
  }

  // Layout
  var tabs=[{k:"dashboard",l:"\uD83C\uDFE0 Dashboard"},{k:"today",l:state.phase==="playoffs"?"\uD83C\uDFC6 Playoffs":"Today"},{k:"schedule",l:"Schedule"},{k:"standings",l:"Standings"},{k:"teams",l:"\uD83C\uDFC0 Teams"},{k:"players",l:"Players"},{k:"leaders",l:"Leaders"},{k:"awards",l:"Awards"},{k:"allstar",l:"\u2B50 All-Star"},{k:"draft",l:"Draft"},{k:"prospects",l:"\uD83C\uDF1F Prospects"},{k:"freeagents",l:"\uD83D\uDD8A FA"},{k:"trades",l:"\uD83D\uDD04 Trades"},{k:"headlines",l:"\uD83D\uDCF0 News"},{k:"social",l:"\uD83D\uDCF1 Social"},{k:"history",l:"History"},{k:"halloffame",l:"\uD83C\uDFDB HOF"},{k:"retired",l:"Retired"}];
  function content(){
    try{
      if(sub){if(sub.t==="team")return vTeam(sub.d);if(sub.t==="box")return vBox(sub.d)}
      var v2={dashboard:vDashboard,teams:vTeams,today:vToday,headlines:vHeadlines,standings:vStandings,schedule:vSchedule,leaders:vLeaders,players:vPlayers,awards:vAwards,allstar:vAllStar,draft:vDraft,trades:vTrades,prospects:vProspects,freeagents:vFreeAgents,retired:vRetired,history:vHistory,social:vSocial,halloffame:vHallOfFame};
      return(v2[view]||vDashboard)();
    }catch(renderErr){
      return h("div",{style:{color:"#ff6b6b",padding:20,background:"#1c2128",borderRadius:8}},
        h("h3",null,"View Error: "+view),
        h("pre",{style:{fontSize:11,whiteSpace:"pre-wrap"}},renderErr.message+"\n"+renderErr.stack),
        h("button",{style:{marginTop:10,padding:"8px 16px",background:"#B22234",color:"#fff",border:"none",borderRadius:6,cursor:"pointer"},onClick:function(){setView("teams");setSub(null)}},"Go to Teams")
      );
    }
  }
  var played=(state.schedule||[]).filter(function(g){return g.result}).length;

  return h("div",{style:{maxWidth:1000,margin:"0 auto",padding:"12px 16px"}},
    modal?function(){try{return renderModal()}catch(e){return null}}():null,
    h("div",{style:{background:"linear-gradient(135deg,#161b22,#0d1117)",color:"#fff",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,borderRadius:12,marginBottom:16,boxShadow:"0 4px 20px rgba(0,0,0,0.4)",border:"1px solid #30363d"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:12}},
        leagueLogo?h("img",{src:leagueLogo,style:{height:40,borderRadius:6}}):null,
        h("label",{style:{cursor:"pointer",display:"flex",alignItems:"center"}},
          h("span",{style:{fontSize:28,fontWeight:800,letterSpacing:2,background:"linear-gradient(135deg,#FFD700,"+PRIMARY+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"MDBA"),
          h("input",{type:"file",accept:"image/*",style:{display:"none"},onChange:function(e){var f=e.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(ev){setLeagueLogo(ev.target.result)};rd.readAsDataURL(f)}})
        ),
        h("div",{style:{fontSize:11,opacity:0.85}},
          h("div",null,(state.seasonNum||2026)+" Season | "+(state.phase==="draft"?(state.draftPhase||"draft").toUpperCase():state.phase.toUpperCase())+" | "+played+"/"+(state.schedule||[]).length+" | 30 Teams"),
          h("div",{style:{display:"flex",alignItems:"center",gap:4,marginTop:2}},
            h("span",{style:{display:"inline-block",width:7,height:7,borderRadius:"50%",background:conn?"#3fb950":"#f85149"}}),
            h("span",{style:{fontSize:10,color:"#8b949e"}},conn?"LIVE":"OFFLINE")
          )
        )
      ),
      h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
        state.phase==="season"&&!state.done?h("button",{style:{background:PRIMARY,color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontWeight:600,fontSize:14,cursor:"pointer"},onClick:simDay},"\u25B6 Day"):null,
        state.phase==="season"&&!state.done?h("button",{style:{background:PRIMARY,color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontWeight:600,fontSize:14,cursor:"pointer"},onClick:simWeek},"\u25B6\u25B6 Week"):null,
        state.phase==="season"&&!state.done?h("button",{style:{background:PRIMARY,color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontWeight:600,fontSize:14,cursor:"pointer"},onClick:simAll},"\u23E9 All"):null,
        state.phase==="season"&&!state.done?h("button",{style:{background:"#1f6feb",color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontWeight:600,fontSize:13,cursor:"pointer"},onClick:simToPlayoffs},"\u23E9 Playoffs"):null,
        state.phase==="season"&&!state.done?h("button",{style:{background:"linear-gradient(135deg,#FFD700,#FFA500)",color:"#0d1117",border:"none",borderRadius:6,padding:"6px 14px",fontWeight:700,fontSize:13,cursor:"pointer"},onClick:simFullSeason},"\u23E9 Full Season"):null,
        h("button",{style:{background:"#21262d",color:"#8b949e",border:"1px solid #30363d",borderRadius:6,padding:"6px 14px",fontWeight:600,fontSize:14,cursor:"pointer"},onClick:resetAll},"\u21BA")
      )
    ),
    h("div",{style:{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap",overflowX:"auto"}},tabs.map(function(t){return h("button",{key:t.k,className:"pill",style:{background:view===t.k&&!sub?PRIMARY:"#21262d",color:view===t.k&&!sub?"#fff":"#8b949e"},onClick:function(){setView(t.k);setSub(null)}},t.l)})),
    content()
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
